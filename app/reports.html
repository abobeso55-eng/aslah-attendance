<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تقرير الغياب اليومي</title>

<style>
body{
  font-family:'Cairo',Arial,sans-serif;
  margin:0;
  background:#f4f6f5;
  color:#2c3e50;
}

/* ===== Header ===== */
header{
  background:#ffffff;
  padding:15px 25px;
  border-bottom:4px solid #1f8f55;
}
.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}
.school{
  display:flex;
  align-items:center;
  gap:15px;
}
.school img{height:60px}
.school-text .ministry,
.school-text .admin{
  color:#1f8f55;
  font-size:14px;
}
.school-text .name{
  color:#1f8f55;
  font-size:18px;
  font-weight:bold;
}
.title{
  color:#1f8f55;
  font-weight:bold;
  font-size:18px;
}

/* ===== Layout ===== */
.container{padding:25px}

/* ===== Date ===== */
.date-box{
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:10px;
}
.date-box input{
  padding:6px 10px;
  font-size:14px;
}

/* ===== Stats ===== */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
  margin-bottom:25px;
}
.stat{
  background:white;
  border-radius:12px;
  padding:18px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.stat h4{margin:0 0 8px;font-size:14px;color:#777}
.stat .num{font-size:22px;font-weight:bold}
.green{color:#198754}
.red{color:#dc3545}
.blue{color:#0d6efd}

/* ===== Classes ===== */
.classes{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
  margin-bottom:30px;
}
.class-card{
  background:white;
  border-radius:10px;
  padding:12px;
  text-align:center;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}
.class-card h4{margin:0 0 6px;font-size:14px}
.class-card .ok{color:#198754;font-size:13px}
.class-card .bad{color:#dc3545;font-size:13px}

/* ===== Absentees ===== */
.section-title{
  font-weight:bold;
  margin-bottom:10px;
}
.absent-groups{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}
.absent-card{
  background:white;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}
.absent-card header{
  background:#1f8f55;
  color:white;
  padding:8px 12px;
  font-size:14px;
  border-radius:10px 10px 0 0;
}
.absent-card ul{
  list-style:none;
  padding:10px;
  margin:0;
}
.absent-card li{
  padding:6px 0;
  border-bottom:1px solid #eee;
  font-size:14px;
}
.absent-card li:last-child{border:none}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="school">
      <img src="assets/moe-logo.png">
      <div class="school-text">
        <div class="ministry">وزارة التعليم</div>
        <div class="admin">إدارة التعليم بمنطقة الباحة</div>
        <div class="name">متوسطة العسلة</div>
      </div>
    </div>
    <div class="title">تقرير الغياب</div>
  </div>
</header>

<div class="container">

  <!-- ✅ اختيار التاريخ -->
  <div class="date-box">
    📅 التاريخ:
    <input type="date" id="reportDate">
  </div>

  <!-- ✅ الإحصائيات -->
  <div class="stats">
    <div class="stat">
      <h4>إجمالي الطلاب</h4>
      <div id="totalStudents" class="num blue">0</div>
    </div>
    <div class="stat">
      <h4>إجمالي الغائبين</h4>
      <div id="absentCount" class="num red">0</div>
    </div>
    <div class="stat">
      <h4>نسبة الغياب</h4>
      <div id="absentPercent" class="num red">0%</div>
    </div>
    <div class="stat">
      <h4>نسبة الحضور</h4>
      <div id="presentPercent" class="num green">0%</div>
    </div>
  </div>

  <!-- ✅ بطاقات الفصول -->
  <div class="classes" id="classCards"></div>

  <!-- ✅ أسماء الغائبين -->
  <div class="section-title">أسماء الطلاب الغائبين</div>
  <div class="absent-groups" id="absentGroups"></div>

</div>

<script>
const dateInput = document.getElementById("reportDate");

// ✅ اليوم افتراضيًا
const today = new Date().toISOString().split("T")[0];
dateInput.value = today;

// ✅ تحميل التقرير تلقائيًا
loadReport(today);

// ✅ عند تغيير التاريخ
dateInput.onchange = () => {
  loadReport(dateInput.value);
};

async function loadReport(date){
  // جلب الفصول
  const classRes = await fetch("/api/getClasses");
  const classData = await classRes.json();
  const classes = classData.classes;

  let totalStudents = 0;
  let totalAbsent = 0;

  const classCards = document.getElementById("classCards");
  const absentGroups = document.getElementById("absentGroups");

  classCards.innerHTML = "";
  absentGroups.innerHTML = "";

  for(const cls of classes){
    const res = await fetch(`/api/getAttendanceReport?class=${encodeURIComponent(cls)}&date=${date}`);
    const data = await res.json();

    totalStudents += data.total;
    totalAbsent += data.absent;

    // بطاقة الفصل
    const c = document.createElement("div");
    c.className = "class-card";
    c.innerHTML = `
      <h4>${cls}</h4>
      ${
        data.absent === 0
          ? `<div class="ok">✅ لا يوجد غياب</div>`
          : `<div class="bad">❌ غياب: ${data.absent}</div>`
      }
    `;
    classCards.appendChild(c);

    // أسماء الغائبين
    if(data.absentees.length > 0){
      const box = document.createElement("div");
      box.className = "absent-card";
      box.innerHTML = `<header>${cls}</header><ul></ul>`;
      const ul = box.querySelector("ul");

      data.absentees.forEach(name=>{
        const li = document.createElement("li");
        li.innerText = name;
        ul.appendChild(li);
      });

      absentGroups.appendChild(box);
    }
  }

  const present = totalStudents - totalAbsent;
  document.getElementById("totalStudents").innerText = totalStudents;
  document.getElementById("absentCount").innerText = totalAbsent;
  document.getElementById("absentPercent").innerText =
    totalStudents > 0 ? ((totalAbsent / totalStudents) * 100).toFixed(1) + "%" : "0%";
  document.getElementById("presentPercent").innerText =
    totalStudents > 0 ? ((present / totalStudents) * 100).toFixed(1) + "%" : "0%";
}
</script>

</body>
</html>
