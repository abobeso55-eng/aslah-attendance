<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تقرير الغياب اليومي</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:'Cairo',Arial,sans-serif;
  background:#f4f6f5;
  margin:0;
  color:#2c3e50;
}
header{
  background:#1f8f55;
  color:white;
  padding:15px 25px;
  font-size:20px;
  font-weight:bold;
}
.container{padding:25px}

/* بطاقات الملخص */
.summary{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  margin-bottom:30px;
}
.card{
  background:white;
  border-radius:14px;
  padding:20px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}
.card h3{margin:0 0 10px}

.good{color:#198754}
.bad{color:#dc3545}
.info{color:#0d6efd}

/* رسم */
.chart-box{
  background:white;
  border-radius:14px;
  padding:20px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  margin-bottom:30px;
}

/* بطاقات الفصول */
.classes{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}
</style>
</head>

<body>

<header>📊 تقرير الغياب اليومي</header>

<div class="container">

  <!-- ✅ ملخص عام -->
  <div class="summary">
    <div class="card">
      <h3>👥 إجمالي الطلاب</h3>
      <div id="totalStudents" class="info">0</div>
    </div>
    <div class="card">
      <h3>✅ نسبة الحضور</h3>
      <div id="presentPercent" class="good">0%</div>
    </div>
    <div class="card">
      <h3>❌ نسبة الغياب</h3>
      <div id="absentPercent" class="bad">0%</div>
    </div>
    <div class="card">
      <h3>🚫 عدد الغائبين</h3>
      <div id="absentCount" class="bad">0</div>
    </div>
  </div>

  <!-- ✅ رسم النسبة -->
  <div class="chart-box">
    <h3>نسبة الحضور والغياب</h3>
    <canvas id="percentChart" height="120"></canvas>
  </div>

  <!-- ✅ الغياب حسب الفصول -->
  <h3>الغياب حسب الفصول</h3>
  <div class="classes" id="classCards"></div>

</div>

<script>
const classes=[
 "أول متوسط (أ)","أول متوسط (ب)","أول متوسط (ج)",
 "ثاني متوسط (أ)","ثاني متوسط (ب)",
 "ثالث متوسط (أ)","ثالث متوسط (ب)"
];

const today=new Date().toISOString().split("T")[0];

let totalStudents=0;
let totalAbsent=0;

const cards=document.getElementById("classCards");

(async ()=>{
  for(const cls of classes){
    const res=await fetch(`/api/getAttendanceReport?class=${encodeURIComponent(cls)}&date=${today}`);
    const data=await res.json();

    totalStudents+=data.total;
    totalAbsent+=data.absent;

    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <h3>${cls}</h3>
      <div class="good">✅ حاضر: ${data.present}</div>
      <div class="bad">❌ غائب: ${data.absent}</div>
    `;
    cards.appendChild(div);
  }

  const present=totalStudents-totalAbsent;
  const presentPct=((present/totalStudents)*100).toFixed(1);
  const absentPct=((totalAbsent/totalStudents)*100).toFixed(1);

  document.getElementById("totalStudents").innerText=totalStudents;
  document.getElementById("absentCount").innerText=totalAbsent;
  document.getElementById("presentPercent").innerText=presentPct+"%";
  document.getElementById("absentPercent").innerText=absentPct+"%";

  drawChart(present, totalAbsent);
})();

function drawChart(present, absent){
  const ctx=document.getElementById("percentChart").getContext("2d");
  new Chart(ctx,{
    type:"doughnut",
    data:{
      labels:["حضور","غياب"],
      datasets:[{
        data:[present,absent],
        backgroundColor:["#2ecc71","#e74c3c"]
      }]
    },
    options:{
      plugins:{
        legend:{position:"bottom"}
      }
    }
  });
}
</script>

</body>
</html>
