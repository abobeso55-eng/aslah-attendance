<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تقارير الغياب</title>

<style>
:root{
  --green:#1f8f55;
  --bg:#f4f6f5;
  --card:#ffffff;
  --red:#dc3545;
}

body{
  margin:0;
  font-family:'Cairo', Arial, sans-serif;
  background:var(--bg);
  color:#2c3e50;
}

/* Header */
header{
  background:#ffffff;
  border-bottom:3px solid var(--green);
}
.header-inner{
  max-width:1100px;
  margin:auto;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
header h2{ margin:0; font-size:18px; }
header .btn{
  background:var(--green);
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  white-space:nowrap;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:16px;
}

.toolbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:16px;
}

.toolbar input{
  padding:8px 10px;
  border-radius:10px;
  border:1px solid #ddd;
}

.print-btn{
  background:#0d6efd;
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:12px;
  margin-bottom:16px;
}
.stat{
  background:var(--card);
  border-radius:14px;
  padding:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.stat .label{ color:#777; font-size:13px; }
.stat .val{ font-size:20px; font-weight:bold; }
.red{ color:var(--red); }
.green{ color:var(--green); }

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:12px;
}

.card{
  background:var(--card);
  border-radius:14px;
  padding:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.card h3{ margin:0 0 8px; }

.error{
  background:#fff3cd;
  color:#664d03;
  border:1px solid #ffecb5;
  padding:12px 16px;
  border-radius:12px;
  margin-bottom:12px;
  display:none;
}

@media print{
  .toolbar, .print-btn, .back-btn{ display:none !important; }
  body{ background:#fff; }
}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <h2>📊 تقارير الغياب</h2>
    students.html⬅️ العودة للغياب</button>
  </div>
</header>

<div class="container">
  <div id="errorBox" class="error"></div>

  <div class="toolbar">
    <div>
      📅 التاريخ:
      <input type="date" id="reportDate" />
    </div>
    <button class="print-btn" onclick="window.print()">🖨️ طباعة التقرير</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="label">إجمالي الطلاب</div><div id="totalStudents" class="val">0</div></div>
    <div class="stat"><div class="label">إجمالي الغائبين</div><div id="absentCount" class="val red">0</div></div>
    <div class="stat"><div class="label">نسبة الغياب</div><div id="absentPercent" class="val red">0%</div></div>
    <div class="stat"><div class="label">نسبة الحضور</div><div id="presentPercent" class="val green">0%</div></div>
  </div>

  <div id="cards" class="cards"></div>
</div>

<script>
const dateInput = document.getElementById("reportDate");
const todayISO = new Date().toISOString().split("T")[0];
dateInput.value = todayISO;

function showError(msg){
  const box = document.getElementById("errorBox");
  box.style.display = "block";
  box.textContent = msg;
}
function clearError(){
  const box = document.getElementById("errorBox");
  box.style.display = "none";
  box.textContent = "";
}

dateInput.onchange = () => loadReport(dateInput.value);

async function loadReport(date){
  clearError();
  const cards = document.getElementById("cards");
  cards.innerHTML = "جاري التحميل...";

  let classData;
  try{
    const res = await fetch("/api/getClasses");
    if(!res.ok) throw new Error(`getClasses failed: ${res.status}`);
    classData = await res.json();
  }catch(e){
    showError("تعذر تحميل الفصول. تأكد أن /api/getClasses يعمل.");
    cards.innerHTML = "";
    return;
  }

  const classes = classData.classes || [];

  let totalStudents = 0;
  let totalAbsent = 0;

  const reports = await Promise.all(
    classes.map(c =>
      fetch(`/api/getAttendanceReport?class=${encodeURIComponent(c)}&date=${date}`)
        .then(r => r.ok ? r.json() : ({ total: 0, absent: 0, present: 0 }))
    )
  );

  cards.innerHTML = "";

  reports.forEach((rep, i) => {
    const cls = classes[i];
    const t = rep.total ?? 0;
    const a = rep.absent ?? 0;
    const p = rep.present ?? (t - a);

    totalStudents += t;
    totalAbsent += a;

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <h3>${cls}</h3>
      <div>✅ حاضر: <strong class="green">${p}</strong></div>
      <div>❌ غائب: <strong class="red">${a}</strong></div>
    `;
    cards.appendChild(card);
  });

  const present = totalStudents - totalAbsent;
  document.getElementById("totalStudents").innerText = totalStudents;
  document.getElementById("absentCount").innerText = totalAbsent;

  document.getElementById("absentPercent").innerText =
    totalStudents > 0 ? ((totalAbsent / totalStudents) * 100).toFixed(1) + "%" : "0%";
  document.getElementById("presentPercent").innerText =
    totalStudents > 0 ? ((present / totalStudents) * 100).toFixed(1) + "%" : "0%";
}

loadReport(todayISO);
</script>

</body>
</html>
