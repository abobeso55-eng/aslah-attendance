<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تقرير الغياب اليومي</title>

<!-- Chart.js -->
https://cdn.jsdelivr.net/npm/chart.js

<style>
body{
  font-family:'Cairo',Arial,sans-serif;
  background:#f4f6f5;
  margin:0;
  color:#2c3e50;
}

/* ===== الهيدر ===== */
header{
  background:#ffffff;
  padding:15px 25px;
  border-bottom:4px solid #1f8f55;
}

.header-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.school-info{
  display:flex;
  align-items:center;
  gap:15px;
}

.school-info img{
  height:70px;
}

.school-text{
  display:flex;
  flex-direction:column;
}

.school-ministry{
  font-size:14px;
  color:#1f8f55;
}

.school-admin{
  font-size:14px;
  color:#1f8f55;
  font-weight:bold;
}

.school-name{
  font-size:20px;
  font-weight:bold;
  color:#1f8f55;
}

/* ===== المحتوى ===== */
.container{padding:25px}

.summary{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  margin-bottom:25px;
}

.card{
  background:white;
  border-radius:14px;
  padding:20px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.good{color:#198754}
.bad{color:#dc3545}
.info{color:#0d6efd}

.chart-box{
  background:white;
  border-radius:14px;
  padding:20px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  margin-bottom:25px;
}

.classes{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}

.print-btn{
  background:#0d6efd;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  margin-bottom:20px;
}

/* ===== الطباعة ===== */
@media print{
  body{background:white}
  .print-btn{display:none}
  header{
    border-bottom:3px solid #000;
  }
  .card,.chart-box{
    box-shadow:none;
    border:1px solid #ccc;
  }
}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="school-info">
      <!-- ✅ شعار وزارة التعليم -->
      <img src="assets/moe-logo.png" alt="وزارة التعليم">

      <div class="school-text">
        <div class="school-ministry">وزارة التعليم</div>
        <div class="school-admin">إدارة التعليم بمنطقة الباحة</div>
        <div class="school-name">متوسطة العسلة</div>
      </div>
    </div>

    <div style="font-weight:bold;color:#1f8f55">
      📊 تقرير الغياب اليومي
    </div>
  </div>
</header>

<div class="container">

  <button class="print-btn" onclick="window.print()">🖨️ طباعة التقرير</button>

  <!-- ✅ ملخص -->
  <div class="summary">
    <div class="card">
      <h3>👥 إجمالي الطلاب</h3>
      <div id="totalStudents" class="info">0</div>
    </div>
    <div class="card">
      <h3>✅ نسبة الحضور</h3>
      <div id="presentPercent" class="good">0%</div>
    </div>
    <div class="card">
      <h3>❌ نسبة الغياب</h3>
      <div id="absentPercent" class="bad">0%</div>
    </div>
    <div class="card">
      <h3>🚫 عدد الغائبين</h3>
      <div id="absentCount" class="bad">0</div>
    </div>
  </div>

  <!-- ✅ الرسم البياني -->
  <div class="chart-box">
    <h3>نسبة الحضور والغياب</h3>
    <canvas id="percentChart" height="120"></canvas>
  </div>

  <!-- ✅ الغياب حسب الفصول -->
  <h3>الغياب حسب الفصول</h3>
  <div class="classes" id="classCards"></div>

</div>

<script>
const classes=[
 "أول متوسط (أ)","أول متوسط (ب)","أول متوسط (ج)",
 "ثاني متوسط (أ)","ثاني متوسط (ب)",
 "ثالث متوسط (أ)","ثالث متوسط (ب)"
];

const today=new Date().toISOString().split("T")[0];
let totalStudents=0;
let totalAbsent=0;
const cards=document.getElementById("classCards");

(async ()=>{
  for(const cls of classes){
    const res=await fetch(`/api/getAttendanceReport?class=${encodeURIComponent(cls)}&date=${today}`);
    const data=await res.json();

    totalStudents+=data.total;
    totalAbsent+=data.absent;

    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <h3>${cls}</h3>
      <p class="good">✅ حاضر: ${data.present}</p>
      <p class="bad">❌ غائب: ${data.absent}</p>
    `;
    cards.appendChild(div);
  }

  const present=totalStudents-totalAbsent;
  document.getElementById("totalStudents").innerText=totalStudents;
  document.getElementById("absentCount").innerText=totalAbsent;
  document.getElementById("presentPercent").innerText=((present/totalStudents)*100).toFixed(1)+"%";
  document.getElementById("absentPercent").innerText=((totalAbsent/totalStudents)*100).toFixed(1)+"%";

  new Chart(document.getElementById("percentChart"),{
    type:"doughnut",
    data:{
      labels:["حضور","غياب"],
      datasets:[{
        data:[present,totalAbsent],
        backgroundColor:["#2ecc71","#e74c3c"]
      }]
    },
    options:{plugins:{legend:{position:"bottom"}}}
  });
})();
</script>

</body>
</html>
