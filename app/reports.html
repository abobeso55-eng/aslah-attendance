<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقارير الغياب</title>

<!-- Chart.js (صحيح) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --green:#1f8f55;
  --red:#dc3545;
  --bg:#f4f6f5;
  --card:#ffffff;
}

body{
  margin:0;
  font-family:'Cairo',Arial,sans-serif;
  background:var(--bg);
  color:#2c3e50;
}

/* HEADER */
header{
  background:#ffffff;
  border-bottom:3px solid var(--green);
  position:sticky;
  top:0;
  z-index:1000;
}
.header-inner{
  max-width:1100px;
  margin:auto;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.back-btn{
  background:var(--green);
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
  white-space:nowrap;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:16px;
}

/* TOOLBAR */
.toolbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:16px;
}
.toolbar input{
  padding:8px 10px;
  border-radius:10px;
  border:1px solid #ccc;
}
.print-btn{
  background:#0d6efd;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
}

/* SUMMARY */
.summary{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:12px;
  margin-bottom:20px;
}
.stat{
  background:var(--card);
  border-radius:14px;
  padding:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.stat .label{ color:#777; font-size:13px; }
.stat .value{ font-size:22px; font-weight:bold; }
.green{ color:var(--green); }
.red{ color:var(--red); }

/* CHARTS */
.charts{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
  margin-bottom:20px;
}
.chart-box{
  background:white;
  border-radius:14px;
  padding:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

/* CLASS CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:12px;
}
.card{
  background:var(--card);
  border-radius:14px;
  padding:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  border-top:6px solid #adb5bd;
}
.card.ok{ border-top-color:var(--green); }
.card.absent{ border-top-color:var(--red); }

/* ERROR */
#errorBox{
  display:none;
  background:#fff3cd;
  color:#7a5600;
  padding:12px 16px;
  border-radius:10px;
  margin-bottom:12px;
}

@media print{
  header, .toolbar, .back-btn{ display:none !important; }
  body{ background:#fff; }
}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <h2>📊 تقارير الغياب</h2>
    <button class="back-btn" onclick="location.href='students<div class="container">

  <div id="errorBox"></div>

  <div class="toolbar">
    <div>
      📅 التاريخ:
      <input type="date" id="reportDate">
    </div>
    <button class="print-btn" onclick="window.print()">🖨️ طباعة</button>
  </div>

  <div class="summary">
    <div class="stat">
      <div class="label">إجمالي الطلاب</div>
      <div id="totalStudents" class="value">0</div>
    </div>
    <div class="stat">
      <div class="label">إجمالي الغائبين</div>
      <div id="totalAbsent" class="value red">0</div>
    </div>
    <div class="stat">
      <div class="label">نسبة الغياب</div>
      <div id="absentPercent" class="value red">0%</div>
    </div>
    <div class="stat">
      <div class="label">نسبة الحضور</div>
      <div id="presentPercent" class="value green">0%</div>
    </div>
  </div>

  <div class="charts">
    <div class="chart-box">
      <h3>نسبة الحضور والغياب</h3>
      <canvas id="pieChart"></canvas>
    </div>
    <div class="chart-box">
      <h3>عدد الغياب لكل فصل</h3>
      <canvas id="barChart"></canvas>
    </div>
  </div>

  <div id="cards" class="cards"></div>

</div>

<script>
const today = new Date().toISOString().split("T")[0];
document.getElementById("reportDate").value = today;

let pieChart, barChart;

async function fetchJson(url){
  const r = await fetch(url,{cache:"no-store"});
  const t = await r.text();
  return JSON.parse(t);
}

async function loadReport(date){
  const classesRes = await fetchJson("/api/getClasses");
  const classes = classesRes.classes || [];

  let totalStudents=0, totalAbsent=0;
  const labels=[], absentData=[];
  const cards=document.getElementById("cards");
  cards.innerHTML="";

  for(const cls of classes){
    const rep = await fetchJson(`/api/getAttendanceReport?class=${encodeURIComponent(cls)}&date=${date}`);

    const t = rep.total ?? 0;
    const a = rep.absent ?? 0;
    const p = t - a;

    totalStudents += t;
    totalAbsent += a;

    labels.push(cls);
    absentData.push(a);

    const card=document.createElement("div");
    card.className="card";
    if(a===0) card.classList.add("ok");
    if(a>0) card.classList.add("absent");

    card.innerHTML=`
      <h3>${cls}</h3>
      <div>👥 الطلاب: <b>${t}</b></div>
      <div class="green">✅ حاضر: <b>${p}</b></div>
      <div class="red">❌ غائب: <b>${a}</b></div>
    `;
    cards.appendChild(card);
  }

  document.getElementById("totalStudents").innerText=totalStudents;
  document.getElementById("totalAbsent").innerText=totalAbsent;

  const absentPct = totalStudents ? ((totalAbsent/totalStudents)*100).toFixed(1) : 0;
  document.getElementById("absentPercent").innerText=absentPct+"%";
  document.getElementById("presentPercent").innerText=(100-absentPct).toFixed(1)+"%";

  if(pieChart) pieChart.destroy();
  if(barChart) barChart.destroy();

  pieChart = new Chart(document.getElementById("pieChart"),{
    type:"pie",
    data:{
      labels:["حاضر","غائب"],
      datasets:[{
        data:[totalStudents-totalAbsent,totalAbsent],
        backgroundColor:["#1f8f55","#dc3545"]
      }]
    }
  });

  barChart = new Chart(document.getElementById("barChart"),{
    type:"bar",
    data:{
      labels:labels,
      datasets:[{
        label:"عدد الغياب",
        data:absentData,
        backgroundColor:"#dc3545"
      }]
    },
    options:{ scales:{ y:{ beginAtZero:true } } }
  });
}

document.getElementById("reportDate").onchange = e => loadReport(e.target.value);
loadReport(today);
</script>

</body>
</html>
