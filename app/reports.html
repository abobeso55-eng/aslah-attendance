<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تقرير الغياب اليومي</title>

<style>
body{
  font-family:'Cairo',Arial,sans-serif;
  background:#f4f6f5;
  margin:0;
}
header{
  background:#1f8f55;
  color:white;
  padding:15px 25px;
  font-size:20px;
}
.container{padding:25px}
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}
.card{
  background:white;
  border-radius:14px;
  padding:20px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}
.good{color:#198754}
.bad{color:#dc3545}
</style>
</head>

<body>

<header>تقرير الغياب اليومي</header>

<div class="container">
  <h2>ملخص اليوم</h2>
  <div class="cards" id="reportCards"></div>
</div>

<script>
const classes=[
 "أول متوسط (أ)","أول متوسط (ب)","أول متوسط (ج)",
 "ثاني متوسط (أ)","ثاني متوسط (ب)",
 "ثالث متوسط (أ)","ثالث متوسط (ب)"
];

const today=new Date().toISOString().split("T")[0];
const cards=document.getElementById("reportCards");

(async ()=>{
  let totalStudents=0;
  let totalAbsent=0;

  for(const cls of classes){
    const res=await fetch(`/api/getAttendanceReport?class=${encodeURIComponent(cls)}&date=${today}`);
    const data=await res.json();

    totalStudents+=data.total;
    totalAbsent+=data.absent;

    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <h3>${cls}</h3>
      <p class="good">الحاضر: ${data.present}</p>
      <p class="bad">الغائب: ${data.absent}</p>`;
    cards.appendChild(div);
  }

  const summary=document.createElement("div");
  summary.className="card";
  summary.innerHTML=`
    <h3>الإجمالي</h3>
    <p class="good">الحاضر: ${totalStudents-totalAbsent}</p>
    <p class="bad">الغائب: ${totalAbsent}</p>`;
  cards.prepend(summary);
})();
</script>

</body>
</html>
