<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الغياب</title>

<style>
body{
  font-family:'Cairo',Arial,sans-serif;
  margin:0;
  background:#f4f6f5;
  color:#2c3e50;
}
header{
  background:#ffffff;
  padding:15px 25px;
  border-bottom:4px solid #1f8f55;
}
.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}
.school{
  display:flex;
  align-items:center;
  gap:15px;
}
.school img{height:60px}
.school-text .ministry,
.school-text .admin{
  color:#1f8f55;
  font-size:14px;
}
.school-text .name{
  color:#1f8f55;
  font-size:18px;
  font-weight:bold;
}
.title{
  color:#1f8f55;
  font-weight:bold;
  font-size:18px;
}
.report-btn{
  background:#0d6efd;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}

.container{padding:25px}

.toolbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.toolbar input{padding:6px 10px}
.save-btn{
  background:#198754;
  color:white;
  border:none;
  padding:8px 18px;
  border-radius:8px;
  cursor:pointer;
}

.alert{
  display:none;
  background:#d1e7dd;
  color:#0f5132;
  padding:12px 16px;
  border-radius:8px;
  margin-bottom:20px;
  font-weight:bold;
}

.classes{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}

.class-card{
  background:white;
  border-radius:12px;
  padding:15px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  border-top:6px solid #198754;
}
.class-card.absent{
  border-top-color:#dc3545;
}
.class-card h4{margin:0 0 10px;font-size:16px}

.student{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 0;
  border-bottom:1px solid #eee;
}
.student:last-child{border:none}

.status-btn{
  border:none;
  padding:4px 12px;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
}
.present{background:#d1e7dd;color:#0f5132}
.absent{background:#f8d7da;color:#842029}

@media print{
  .report-btn,.save-btn,.alert{display:none}
}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="school">
      assets/moe-logo.png
      <div class="school-text">
        <div class="ministry">وزارة التعليم</div>
        <div class="admin">إدارة التعليم بمنطقة الباحة</div>
        <div class="name">متوسطة العسلة</div>
      </div>
    </div>
    <div class="title">تسجيل الغياب</div>
    <button class="report-btn" onclick="location.href='reports.html'v>
</header>

<div class="container">

  <div id="attendanceAlert" class="alert">
    ✅ تم تسجيل الغياب اليوم
  </div>

  <div class="toolbar">
    <div>
      📅 التاريخ:
      <input type="date" id="attendanceDate">
    </div>
    <button class="save-btn" onclick="saveAttendance()">💾 حفظ الغياب</button>
  </div>

  <div class="classes" id="classesContainer"></div>

</div>

<script>
const today = new Date().toISOString().split("T")[0];
document.getElementById("attendanceDate").value = today;

const classesContainer = document.getElementById("classesContainer");
const absentees = {};
const alertBox = document.getElementById("attendanceAlert");

loadClasses();

async function loadClasses(){
  const classRes = await fetch("/api/getClasses");
  const classData = await classRes.json();
  const classes = classData.classes;

  classesContainer.innerHTML = "";
  let alreadySaved = false;

  for(const cls of classes){
    // ✅ جلب الغياب مع حماية
    const arep = await fetch(`/api/getAttendanceReport?class=${encodeURIComponent(cls)}&date=${today}`);
    const arepData = await arep.json();
    absentees[cls] = Array.isArray(arepData.absentees) ? [...arepData.absentees] : [];

    if(absentees[cls].length > 0) alreadySaved = true;

    const card = document.createElement("div");
    card.className = "class-card" + (absentees[cls].length ? " absent" : "");
    card.innerHTML = `<h4>${cls}</h4>`;
    classesContainer.appendChild(card);

    const sres = await fetch(`/api/getStudents?class=${encodeURIComponent(cls)}`);
    const sdata = await sres.json();

    sdata.students.forEach(student=>{
      const row = document.createElement("div");
      row.className = "student";

      const nameSpan = document.createElement("span");
      nameSpan.innerText = student.Name;

      const btn = document.createElement("button");
      const isAbsent = absentees[cls].includes(student.Name);

      btn.className = "status-btn " + (isAbsent ? "absent" : "present");
      btn.innerText = isAbsent ? "غائب" : "حاضر";

      btn.onclick = () => {
        if(btn.classList.contains("present")){
          btn.classList.replace("present","absent");
          btn.innerText="غائب";
          absentees[cls].push(student.Name);
          card.classList.add("absent");
        }else{
          btn.classList.replace("absent","present");
          btn.innerText="حاضر";
          absentees[cls] = absentees[cls].filter(n=>n!==student.Name);
          if(absentees[cls].length===0) card.classList.remove("absent");
        }
      };

      row.appendChild(nameSpan);
      row.appendChild(btn);
      card.appendChild(row);
    });
  }

  if(alreadySaved){
    alertBox.style.display="block";
    setTimeout(()=>alertBox.style.display="none",4000);
  }
}

async function saveAttendance(){
  for(const cls in absentees){
    await fetch("/api/saveAttendance",{
      method:"POST",
      headers:{ "Content-Type":"application/json"},
      body:JSON.stringify({
        className:cls,
        date:today,
        absentees:absentees[cls]
      })
    });
  }
  alertBox.style.display="block";
  setTimeout(()=>alertBox.style.display="none",4000);
}
</script>

</body>
</html>
``
