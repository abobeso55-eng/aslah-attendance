<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الغياب</title>

<style>
:root{
  --green:#1f8f55;
  --red:#dc3545;
  --gray:#adb5bd;
  --bg:#f4f6f5;
  --card:#ffffff;
}

body{
  margin:0;
  font-family:'Cairo',Arial,sans-serif;
  background:var(--bg);
  color:#2c3e50;
}

/* HEADER */
header{
  background:#fff;
  border-bottom:3px solid var(--green);
}
.header-inner{
  max-width:1100px;
  margin:auto;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.school{
  display:flex;
  align-items:center;
  gap:12px;
}
.school img{ height:60px; }
.school-text strong{ font-size:17px; }

.reports-btn{
  background:var(--green);
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
}

/* SMART COUNTER */
.counter{
  max-width:1100px;
  margin:15px auto;
  padding:14px;
  background:#e9f7ef;
  border-right:6px solid var(--green);
  border-radius:12px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:10px;
  font-weight:bold;
}
.counter div{
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}

/* CONTENT */
.container{
  max-width:1100px;
  margin:auto;
  padding:16px;
}

.grade-title{
  background:#e1f3ea;
  padding:10px;
  border-right:6px solid var(--green);
  border-radius:10px;
  margin:25px 0 10px;
  font-weight:bold;
  font-size:19px;
}

.classes-grid{
  display:grid;
  gap:15px;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
}

.class-card{
  background:white;
  padding:16px;
  border-radius:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  border-top:6px solid var(--gray);
}
.class-card.ok{ border-top-color:var(--green); }
.class-card.absent{ border-top-color:var(--red); }

.card-btn{
  width:100%;
  background:var(--green);
  color:white;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:8px;
  cursor:pointer;
}

/* ATTENDANCE */
.hidden{ display:none; }

.attendance{
  background:white;
  padding:16px;
  border-radius:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.student{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #eee;
}
.status-btn{
  padding:6px 14px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}
.present{ background:#d1e7dd; color:#0f5132; }
.absent{ background:#f8d7da; color:#842029; }

.actions button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}
.save-btn{ background:var(--green); color:white; }
.back-btn{ background:#6c757d; color:white; }
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="school">
      assets/moe-logo.png
      <div class="school-text">
        وزارة التعليم<br>
        إدارة التعليم بمنطقة الباحة<br>
        <strong>متوسطة العسلة</strong>
      </div>
    </div>
    <button class="reports-btn" onclick="location.href='reports.htmlCOUNTER -->
<div class="counter">
  <div>🏫 إجمالي الفصول: <span id="cClasses">0</span></div>
  <div>👥 إجمالي الطلاب: <span id="cStudents">0</span></div>
  <div>❌ غياب اليوم: <span id="cAbsent">0</span></div>
</div>

<div class="container">
  <div id="classesContainer"></div>

  <div id="attendanceView" class="attendance hidden">
    <h2 id="classTitle"></h2>
    <div id="studentsList"></div>

    <div class="actions">
      <button class="save-btn" onclick="saveAttendance()">💾 حفظ الغياب</button>
      <button class="back-btn" onclick="backToClasses()">⬅️ رجوع</button>
    </div>
  </div>
</div>

<script>
const today = new Date().toISOString().split("T")[0];

function classOrder(name){
  let g=99;
  if(name.includes("أول")) g=1;
  else if(name.includes("ثاني")) g=2;
  else if(name.includes("ثالث")) g=3;

  const sec=name.match(/\((.*?)\)/);
  const letter=sec?sec[1]:"";
  const letters="أبجدهوزحطيكلمنسعفصقرشتثخذضظغ";
  const l=letters.indexOf(letter)>=0?letters.indexOf(letter):999;

  return g*100+l;
}

async function fetchJson(url){
  const r=await fetch(url,{cache:"no-store"});
  const t=await r.text();
  try{return JSON.parse(t);}catch{throw new Error("خطأ API");}
}

let selectedClass=null;
let absentees=[];

async function loadDashboard(){
  const container=document.getElementById("classesContainer");
  container.innerHTML="جاري التحميل...";

  let totalStudents=0,totalAbsent=0;

  const classesRes=await fetchJson("/api/getClasses");
  const classes=classesRes.classes.sort((a,b)=>classOrder(a)-classOrder(b));

  document.getElementById("cClasses").innerText=classes.length;

  container.innerHTML="";

  const grades={1:"أول متوسط",2:"ثاني متوسط",3:"ثالث متوسط"};

  for(const [num,title] of Object.entries(grades)){
    const list=classes.filter(c=>c.includes(title.split(" ")[0]));
    if(!list.length) continue;

    const t=document.createElement("div");
    t.className="grade-title";
    t.innerText=title;
    container.appendChild(t);

    const grid=document.createElement("div");
    grid.className="classes-grid";

    for(const cls of list){
      const [s,r]=await Promise.all([
        fetchJson(`/api/getStudents?class=${encodeURIComponent(cls)}`),
        fetchJson(`/api/getAttendanceReport?class=${encodeURIComponent(cls)}&date=${today}`)
      ]);

      const students=s.students.length;
      const absent=r.absent??0;

      totalStudents+=students;
      totalAbsent+=absent;

      const card=document.createElement("div");
      card.className="class-card";
      if(absent===0) card.classList.add("ok");
      if(absent>0) card.classList.add("absent");

      card.innerHTML=`
        <h3>${cls}</h3>
        <div>👥 الطلاب: <b>${students}</b></div>
        <div>❌ الغياب: <b>${absent}</b></div>
        <button class="card-btn" onclick="openClass('${cls}')">📝 تسجيل الغياب</button>
        <button class="card-btn" onclick="location.href='reports.html?class=${encodeURIComponent(clsChild(card);
    }

    container.appendChild(grid);
  }

  document.getElementById("cStudents").innerText=totalStudents;
  document.getElementById("cAbsent").innerText=totalAbsent;
}

async function openClass(cls){
  selectedClass=cls;
  absentees=[];

  document.getElementById("classesContainer").style.display="none";
  document.getElementById("attendanceView").classList.remove("hidden");
  document.getElementById("classTitle").innerText=cls;

  const list=document.getElementById("studentsList");
  list.innerHTML="جاري التحميل...";

  const data=await fetchJson(`/api/getStudents?class=${encodeURIComponent(cls)}`);
  list.innerHTML="";

  data.students.forEach(s=>{
    const row=document.createElement("div");
    row.className="student";

    const name=document.createElement("span");
    name.innerText=s.Name;

    const btn=document.createElement("button");
    btn.className="status-btn present";
    btn.innerText="حاضر";

    btn.onclick=()=>{
      if(btn.classList.contains("present")){
        btn.classList.replace("present","absent");
        btn.innerText="غائب";
        absentees.push(s.Name);
      }else{
        btn.classList.replace("absent","present");
        btn.innerText="حاضر";
        absentees=absentees.filter(n=>n!==s.Name);
      }
    };

    row.appendChild(name);
    row.appendChild(btn);
    list.appendChild(row);
  });
}

function backToClasses(){
  document.getElementById("attendanceView").classList.add("hidden");
  document.getElementById("classesContainer").style.display="block";
}

async function saveAttendance(){
  await fetch("/api/saveAttendance",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      className:selectedClass,
      date:today,
      absentees
    })
  });

  alert("✅ تم حفظ الغياب");
  backToClasses();
  loadDashboard(); // ✅ تحديث تلقائي للعداد
}

document.addEventListener("DOMContentLoaded",loadDashboard);
</script>

</body>
</html>
