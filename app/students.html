<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الغياب</title>

<style>
:root{
  --green:#1f8f55;
  --red:#dc3545;
  --gray:#adb5bd;
  --bg:#f4f6f5;
  --card:#ffffff;
}

body{
  margin:0;
  font-family:'Cairo',Arial,sans-serif;
  background:var(--bg);
  color:#2c3e50;
}

/* ===== Header ===== */
header{
  background:#ffffff;
  border-bottom:3px solid var(--green);
}
.header-inner{
  max-width:900px;
  margin:auto;
  padding:14px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

/* معلومات المدرسة */
.school{
  display:flex;
  align-items:center;
  gap:12px;
}
.school img{
  height:56px;
}
.school-text{
  font-size:14px;
  line-height:1.4;
}
.school-text strong{
  font-size:16px;
}

/* زر التقارير */
.reports-btn{
  background:var(--green);
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  font-size:14px;
  cursor:pointer;
  white-space:nowrap;
}

/* ===== Counter ===== */
.counter{
  max-width:900px;
  margin:10px auto 0;
  padding:12px 16px;
  background:#e9f5ef;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

/* ===== Container ===== */
.container{
  max-width:900px;
  margin:auto;
  padding:16px;
}

/* ===== Classes ===== */
.classes{
  display:grid;
  grid-template-columns:1fr;
  gap:16px;
}
@media (min-width:600px){
  .classes{grid-template-columns:repeat(2,1fr);}
}
@media (min-width:900px){
  .classes{grid-template-columns:repeat(3,1fr);}
}

.class-card{
  background:var(--card);
  border-radius:14px;
  padding:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  border-top:6px solid var(--gray);
}
.class-card.ok{border-top-color:var(--green)}
.class-card.absent{border-top-color:var(--red)}

.class-card h3{margin:0 0 6px}
.class-card .count{color:#777;margin-bottom:6px}
.class-card .status{font-size:14px;margin-bottom:10px}
.class-card button{
  width:100%;
  background:var(--green);
  color:white;
  border:none;
  padding:10px;
  font-size:15px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="header-inner">

    <!-- ✅ الشعار الصحيح -->
    <div class="school">
      <img src="assets/moe-logo.png" alt="شعار وزارة التعليم">
      <div class="school-text">
        وزارة التعليم<br>
        إدارة التعليم بمنطقة الباحة<br>
        <strong>متوسطة العسلة</strong>
      </div>
    </div>

    <!-- ✅ زر التقارير (سيظهر حتمًا) -->
    <button class="reports-btn" onclick="location.href
  <div>الفصول المسجّلة: —</div>
  <div>إجمالي الغائبين: —</div>
</div>

<div class="container">
  <div class="classes">
    <!-- بطاقات الفصول ستظهر هنا -->
  </div>
</div>

</body>
</html>
