<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الغياب</title>

    <style>
        body {
            font-family: 'Tahoma';
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        #classSelect {
            width: 250px;
            padding: 10px;
            margin: 20px auto;
            display: block;
        }

        .student-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            box-shadow: 0 0 5px #ccc;
        }

        .status-btn {
            padding: 8px 18px;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .present {
            background: #28a745;
        }

        .absent {
            background: #dc3545;
        }
    </style>

</head>

<body>

    <h1>تسجيل الغياب</h1>

    <select id="classSelect">
        <option value="">اختر الفصل</option>
    </select>

    <div id="studentsList"></div>

    <script src="students.js"></script>

</body>

</html>
