<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>إدارة الطلاب</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      background: #f2f5f4;
      font-family: 'Cairo', sans-serif;
      margin: 0;
      padding: 0;
      color: #2c3e50;
      display: flex;
    }

    .sidebar {
      width: 260px;
      background: #27ae60;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      text-align: center;
    }

    .class-item {
      padding: 12px;
      background: rgba(255,255,255,0.1);
      margin-bottom: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    .class-item:hover {
      background: rgba(255,255,255,0.3);
    }

    .active {
      background: white !important;
      color: #27ae60 !important;
      font-weight: bold;
    }

    .content {
      flex-grow: 1;
      padding: 30px;
    }

    .upload-box {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .upload-box button {
      padding: 12px 20px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .upload-box button:hover {
      background: #1d8a4d;
    }

    .student-row {
      background: white;
      margin-bottom: 10px;
      padding: 15px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <h2>الفصول</h2>
    <div id="classesList"></div>
  </div>

  <div class="content">
    <h2 id="selectedClassTitle">اختر فصلًا</h2>

    <div class="upload-box">
      <h3>📤 رفع أسماء الطلاب من ملف Excel</h3>
      <input type="file" id="excelFile" accept=".xlsx" />
      <br><br>
      <button onclick="uploadExcel()">رفع الملف</button>
    </div>

    <div id="studentsList"></div>
  </div>

  <script>
    const classes = [
      "أول متوسط (أ)",
      "أول متوسط (ب)",
      "أول متوسط (ج)",
      "ثاني متوسط (أ)",
      "ثاني متوسط (ب)",
      "ثالث متوسط (أ)",
      "ثالث متوسط (ب)"
    ];

    let selectedClass = null;

    const clsList = document.getElementById("classesList");
    classes.forEach(cls => {
      const div = document.createElement("div");
      div.className = "class-item";
      div.innerText = cls;
      div.onclick = () => selectClass(cls, div);
      clsList.appendChild(div);
    });

    function selectClass(cls, element) {
      selectedClass = cls;
      document.querySelectorAll(".class-item").forEach(x => x.classList.remove("active"));
      element.classList.add("active");
      document.getElementById("selectedClassTitle").innerText = "الفصل: " + cls;
    }

    // ✅ حماية إضافية عند رفع الملف
    async function uploadExcel() {
      const fileInput = document.getElementById("excelFile");

      if (!fileInput.files.length) {
        alert("الرجاء اختيار ملف Excel أولاً");
        return;
      }

      try {
        const buffer = await fileInput.files[0].arrayBuffer();

        const res = await fetch("/api/uploadStudentsExcel", {
          method: "POST",
          headers: {
            "Content-Type": "application/octet-stream"
          },
          body: buffer
        });

        // ✅ نقرأ الرد كنص أولاً
        const text = await res.text();

        let result;
        try {
          result = JSON.parse(text);
        } catch {
          // ❌ لو رجع HTML أو نص غير JSON
          alert("حدث خطأ في الخادم (الرد غير صالح)");
          console.error("Server response:", text);
          return;
        }

        if (!res.ok || !result.success) {
          alert(result.error || "فشل رفع الملف");
          return;
        }

        // ✅ نجاح
        alert(
          "✅ " + result.message +
          "\nعدد المدخلين: " + result.inserted +
          "\nالمتجاهلين: " + result.skipped
        );

      } catch (err) {
        alert("حدث خطأ غير متوقع أثناء الرفع");
        console.error(err);
      }
    }
  </script>

</body>
</html>
