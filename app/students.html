<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الغياب</title>

<style>
:root{
  --green:#1f8f55;
  --red:#dc3545;
  --gray:#adb5bd;
  --bg:#f4f6f5;
  --card:#ffffff;
}

body{
  margin:0;
  font-family:'Cairo',Arial,sans-serif;
  background:var(--bg);
  color:#2c3e50;
}

/* ===== Header ===== */
header{
  background:#ffffff;
  border-bottom:3px solid var(--green);
}
.header-inner{
  max-width:1000px;
  margin:auto;
  padding:14px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.school{
  display:flex;
  align-items:center;
  gap:12px;
}
.school img{
  height:56px;
}
.school-text{
  font-size:14px;
  line-height:1.4;
  white-space:nowrap;
}
.school-text strong{
  font-size:16px;
}

.reports-btn{
  background:var(--green);
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  white-space:nowrap;
  cursor:pointer;
}

/* ===== Counter ===== */
.counter{
  max-width:1000px;
  margin:12px auto 0;
  background:#e8f5e9;
  padding:12px 16px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

/* ===== Error ===== */
#errorBox{
  max-width:1000px;
  margin:12px auto;
  background:#fff3cd;
  color:#7a5600;
  padding:12px 16px;
  border-radius:10px;
  display:none;
}

/* ===== Class Cards ===== */
.container{
  max-width:1000px;
  margin:auto;
  padding:16px;
}
.classes{
  display:grid;
  grid-template-columns:1fr;
  gap:16px;
}
@media (min-width:700px){
  .classes{ grid-template-columns:repeat(2,1fr); }
}
@media (min-width:1000px){
  .classes{ grid-template-columns:repeat(3,1fr); }
}

.class-card{
  background:white;
  border-radius:14px;
  padding:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  border-top:6px solid var(--gray);
}
.class-card.ok{ border-top-color:var(--green); }
.class-card.absent{ border-top-color:var(--red); }

/* ===== Attendance View ===== */
.hidden{ display:none; }

.attendance{
  background:white;
  border-radius:14px;
  padding:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.student{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid #eee;
}
.status-btn{
  border:none;
  padding:6px 14px;
  border-radius:20px;
  cursor:pointer;
  min-width:74px;
}
.present{ background:#d1e7dd; color:#0f5132; }
.absent{ background:#f8d7da; color:#842029; }

.actions{
  margin-top:20px;
}
.actions button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:16px;
  cursor:pointer;
}
.save-btn{ background:var(--green); color:white; margin-bottom:10px; }
.back-btn{ background:#6c757d; color:white; }
</style>
</head>

<body>

<header>
  <div class="header-inner">

    <div class="school">
      <img src="assets/moe-logo.png" alt="شعار">
      <div class="school-text">
        وزارة التعليم<br>
        إدارة التعليم بمنطقة الباحة<br>
        <strong>متوسطة العسلة</strong>
      </div>
    </div>

    <button class="reports-btn" onclick="locationnter">
  <div id="counterClasses">الفصول المسجّلة: ...</div>
  <div id="counterAbsent">إجمالي الغائبين: ...</div>
</div>

<div id="errorBox"></div>

<div class="container">

  <div id="classesView" class="classes"></div>

  <div id="attendanceView" class="attendance hidden">
    <h2 id="classTitle"></h2>
    <div id="studentsList">جاري التحميل...</div>

    <div class="actions">
      <button class="save-btn" onclick="saveAttendance()">💾 حفظ</button>
      <button class="back-btn" onclick="backToClasses()">⬅️ رجوع</button>
    </div>
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  loadDashboard();
});

function showError(msg){
  const e = document.getElementById("errorBox");
  e.innerText = msg;
  e.style.display = "block";
}

async function fetchJson(url){
  let res = await fetch(url, {cache:"no-store"});
  let txt = await res.text();
  try{ 
    return JSON.parse(txt);
  }catch{
    throw new Error("الاستجابة ليست JSON: " + url);
  }
}

let selectedClass = null;
let absentees = [];

async function loadDashboard(){
  const classesView = document.getElementById("classesView");
  classesView.innerHTML = "جاري تحميل الفصول...";

  try{
    const data = await fetchJson("/api/getClasses");
    const classes = data.classes || [];

    classesView.innerHTML = "";

    classes.forEach(cls=>{
      const card = document.createElement("div");
      card.className = "class-card";

      card.innerHTML = `
        <h3>${cls}</h3>
        <button onclick="openClass('${cls}')">تسجيل الغياب</button>
      `;

      classesView.appendChild(card);
    });

  }catch(e){
    showError("تعذر تحميل الفصول: " + e.message);
  }
}

async function openClass(cls){
  selectedClass = cls;
  absentees = [];

  document.getElementById("classesView").classList.add("hidden");
  document.getElementById("attendanceView").classList.remove("hidden");
  document.getElementById("classTitle").innerText = cls;

  const list = document.getElementById("studentsList");
  list.innerHTML = "جاري تحميل الطلاب...";

  try{
    const data = await fetchJson(`/api/getStudents?class=${encodeURIComponent(cls)}`);
    const students = data.students || [];

    list.innerHTML = "";

    students.forEach(s=>{
      const row = document.createElement("div");
      row.className = "student";

      const name = document.createElement("span");
      name.innerText = s.Name;

      const btn = document.createElement("button");
      btn.className = "status-btn present";
      btn.innerText = "حاضر";

      btn.onclick = ()=>{
        if(btn.classList.contains("present")){
          btn.classList.replace("present","absent");
          btn.innerText = "غائب";
          absentees.push(s.Name);
        }else{
          btn.classList.replace("absent","present");
          btn.innerText = "حاضر";
          absentees = absentees.filter(n=>n!==s.Name);
        }
      };

      row.appendChild(name);
      row.appendChild(btn);
      list.appendChild(row);
    });

  }catch(e){
    showError("تعذر تحميل الطلاب: " + e.message);
  }
}

async function saveAttendance(){
  try{
    let res = await fetch("/api/saveAttendance",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        className: selectedClass,
        date: new Date().toISOString().split("T")[0],
        absentees
      })
    });

    let txt = await res.text();
    try{ JSON.parse(txt); }catch{}

    alert("✅ تم حفظ الغياب");
    backToClasses();
    loadDashboard();

  }catch(e){
    showError("فشل حفظ الغياب: " + e.message);
  }
}

function backToClasses(){
  document.getElementById("attendanceView").classList.add("hidden");
  document.getElementById("classesView").classList.remove("hidden");
}
</script>

</body>
</html>
``
