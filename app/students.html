<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الغياب</title>

<style>
body{
  font-family:'Cairo',Arial,sans-serif;
  margin:0;
  background:#f4f6f5;
  color:#2c3e50;
}

/* ===== Header ===== */
header{
  background:#1f8f55;
  color:white;
  padding:15px 25px;
}
.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.title{
  font-size:20px;
  font-weight:bold;
}
.report-btn{
  background:white;
  color:#1f8f55;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}

/* ===== Layout ===== */
.container{padding:25px}

/* ===== Cards ===== */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}
.card{
  background:white;
  border-radius:12px;
  padding:20px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  text-align:center;
}
.card h3{
  margin:0 0 10px;
}
.card .count{
  color:#777;
  margin-bottom:15px;
}
.card button{
  background:#1f8f55;
  color:white;
  border:none;
  padding:8px 16px;
  border-radius:8px;
  cursor:pointer;
}

/* ===== Attendance ===== */
.hidden{display:none}

.toolbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.back-btn{
  background:#6c757d;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}
.save-btn{
  background:#198754;
  color:white;
  border:none;
  padding:8px 18px;
  border-radius:8px;
  cursor:pointer;
}

.student{
  background:white;
  border-radius:8px;
  padding:10px 15px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.status-btn{
  border:none;
  padding:4px 12px;
  border-radius:6px;
  cursor:pointer;
}
.present{background:#d1e7dd;color:#0f5132}
.absent{background:#f8d7da;color:#842029}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="title">تسجيل الغياب اليومي</div>
    <button class="report-btn" onclick="location.href='reports.html

<div class="container">

  <!-- ===== الفصول ===== -->
  <div id="classesView" class="cards"></div>

  <!-- ===== الغياب ===== -->
  <div id="attendanceView" class="hidden">
    <div class="toolbar">
      <button class="back-btn" onclick="backToClasses()">⬅️ الرجوع للفصول</button>
      <button class="save-btn" onclick="saveAttendance()">💾 حفظ الغياب</button>
    </div>
    <h3 id="classTitle"></h3>
    <div id="studentsList"></div>
  </div>

</div>

<script>
const today = new Date().toISOString().split("T")[0];
let selectedClass = null;
let absentees = [];

// ===== تحميل الفصول =====
loadClasses();

async function loadClasses(){
  const res = await fetch("/api/getClasses");
  const data = await res.json();
  const classes = data.classes;

  const container = document.getElementById("classesView");
  container.innerHTML = "";

  for(const cls of classes){
    const sres = await fetch(`/api/getStudents?class=${encodeURIComponent(cls)}`);
    const sdata = await sres.json();

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <h3>${cls}</h3>
      <div class="count">عدد الطلاب: ${sdata.students.length}</div>
      <button onclick="openClass('${cls}')">تسجيل الغياب</button>
    `;
    container.appendChild(card);
  }
}

// ===== فتح فصل =====
async function openClass(cls){
  selectedClass = cls;
  absentees = [];

  document.getElementById("classesView").classList.add("hidden");
  document.getElementById("attendanceView").classList.remove("hidden");
  document.getElementById("classTitle").innerText = cls;

  const res = await fetch(`/api/getStudents?class=${encodeURIComponent(cls)}`);
  const data = await res.json();

  const list = document.getElementById("studentsList");
  list.innerHTML = "";

  data.students.forEach(s=>{
    const row = document.createElement("div");
    row.className = "student";

    const name = document.createElement("span");
    name.innerText = s.Name;

    const btn = document.createElement("button");
    btn.className = "status-btn present";
    btn.innerText = "حاضر";

    btn.onclick = () => {
      if(btn.classList.contains("present")){
        btn.classList.replace("present","absent");
        btn.innerText="غائب";
        absentees.push(s.Name);
      }else{
        btn.classList.replace("absent","present");
        btn.innerText="حاضر";
        absentees = absentees.filter(n=>n!==s.Name);
      }
    };

    row.appendChild(name);
    row.appendChild(btn);
    list.appendChild(row);
  });
}

// ===== حفظ =====
async function saveAttendance(){
  await fetch("/api/saveAttendance",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      className:selectedClass,
      date:today,
      absentees
    })
  });

  alert("✅ تم حفظ الغياب");
  backToClasses();
}

// ===== رجوع =====
function backToClasses(){
  document.getElementById("attendanceView").classList.add("hidden");
  document.getElementById("classesView").classList.remove("hidden");
}
</script>

</body>
</html>
