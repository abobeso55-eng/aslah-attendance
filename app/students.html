<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الغياب</title>

<style>
body{
  font-family:'Cairo',Arial,sans-serif;
  margin:0;
  background:#f4f6f5;
  color:#2c3e50;
}

/* ===== Header ===== */
header{
  background:#ffffff;
  padding:15px 25px;
  border-bottom:4px solid #1f8f55;
}
.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}
.school{
  display:flex;
  align-items:center;
  gap:15px;
}
.school img{height:60px}
.school-text .ministry,
.school-text .admin{
  color:#1f8f55;
  font-size:14px;
}
.school-text .name{
  color:#1f8f55;
  font-size:18px;
  font-weight:bold;
}
.title{
  color:#1f8f55;
  font-weight:bold;
  font-size:18px;
}

/* زر التقارير */
.report-btn{
  background:#0d6efd;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}

/* ===== Layout ===== */
.container{padding:25px}

.toolbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.toolbar input{
  padding:6px 10px;
}
.save-btn{
  background:#198754;
  color:white;
  border:none;
  padding:8px 18px;
  border-radius:8px;
  cursor:pointer;
}

/* ===== Classes ===== */
.classes{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}

/* بطاقة الفصل */
.class-card{
  background:white;
  border-radius:12px;
  padding:15px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  border-top:6px solid #198754; /* افتراضي أخضر */
}
.class-card.absent{
  border-top-color:#dc3545; /* أحمر عند وجود غياب */
}
.class-card h4{
  margin:0 0 10px;
  font-size:16px;
}

/* الطلاب */
.student{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 0;
  border-bottom:1px solid #eee;
}
.student:last-child{border:none}

.status-btn{
  border:none;
