<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الغياب</title>

<style>
:root{
  --green:#1f8f55;
  --red:#dc3545;
  --gray:#adb5bd;
  --bg:#f4f6f5;
  --card:#ffffff;
}

body{
  margin:0;
  font-family:'Cairo',Arial,sans-serif;
  background:var(--bg);
  color:#2c3e50;
}

/* ===== Header ===== */
header{
  background:#ffffff;
  border-bottom:3px solid var(--green);
}
.header-inner{
  max-width:900px;
  margin:auto;
  padding:12px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

/* معلومات المدرسة */
.school{
  display:flex;
  align-items:center;
  gap:12px;
}
.school img{
  height:60px;
}
.school-text{
  font-size:14px;
  line-height:1.4;
}
.school-text strong{
  font-size:16px;
}

/* ✅ زر التقارير */
.reports-btn{
  background:var(--green);
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  font-size:14px;
  cursor:pointer;
  white-space:nowrap;
  flex-shrink:0;
}

/* ===== Counter ===== */
.counter{
  max-width:900px;
  margin:10px auto 0;
  padding:12px 16px;
  background:#e9f5ef;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

/* ===== Alert ===== */
.alert{
  max-width:900px;
  margin:10px auto;
  padding:12px 16px;
  background:#d1e7dd;
  color:#0f5132;
  border-radius:12px;
  display:none;
  font-weight:bold;
}

/* ===== Container ===== */
.container{
  max-width:900px;
  margin:auto;
  padding:16px;
}

/* ===== Classes ===== */
.classes{
  display:grid;
  grid-template-columns:1fr;
  gap:16px;
}
@media (min-width:600px){
  .classes{ grid-template-columns:repeat(2,1fr); }
}
@media (min-width:900px){
  .classes{ grid-template-columns:repeat(3,1fr); }
}

.class-card{
  background:var(--card);
  border-radius:14px;
  padding:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  border-top:6px solid var(--gray);
}
.class-card.ok{border-top-color:var(--green)}
.class-card.absent{border-top-color:var(--red)}

.class-card h3{margin:0 0 6px}
.class-card .count{color:#777;margin-bottom:6px}
.class-card .status{font-size:14px;margin-bottom:10px}
.class-card button{
  width:100%;
  background:var(--green);
  color:white;
  border:none;
  padding:10px;
  font-size:15px;
  border-radius:10px;
  cursor:pointer;
}

/* ===== Attendance ===== */
.hidden{display:none}
.attendance{
  background:var(--card);
  border-radius:14px;
  padding:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.student{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid #eee;
}
.student:last-child{border:none}

.status-btn{
  border:none;
  padding:6px 14px;
  border-radius:20px;
  cursor:pointer;
}
.present{background:#d1e7dd;color:#0f5132}
.absent{background:#f8d7da;color:#842029}

.actions{
  margin-top:20px;
}
.actions button{
  width:100%;
  padding:14px;
  font-size:16px;
  border-radius:14px;
  border:none;
  cursor:pointer;
}
.save-btn{background:var(--green);color:white;margin-bottom:10px}
.back-btn{background:#6c757d;color:white}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="school">
      <img src="assets/moe-logo.png" alt="شعار وزارة التعليم">
      <div class="school-text">
        وزارة التعليم<br>
        إدارة التعليم بمنطقة الباحة<br>
        <strong>متوسطة العسلة</strong>
      </div>
    </div>

    <!-- ✅ زر التقارير واضح دائمًا -->
    <button class="reports-btn" onclick="location.href  <div id="counterClasses">الفصول المسجّلة: 0</div>
  <div id="counterAbsent">إجمالي الغائبين: 0</div>
</div>

<div id="successAlert" class="alert">
  ✅ تم تسجيل الغياب بنجاح
</div>

<div class="container">

  <div id="classesView" class="classes"></div>

  <div id="attendanceView" class="attendance hidden">
    <h2 id="classTitle"></h2>
    <div id="studentsList"></div>

    <div class="actions">
      <button class="save-btn" onclick="saveAttendance()">💾 حفظ الغياب</button>
      <button class="back-btn" onclick="backToClasses()">⬅️ الرجوع للفصول</button>
    </div>
  </div>

</div>

<script>
const today = new Date().toISOString().split("T")[0];
let selectedClass=null;
let absentees=[];
let totalClasses=0;
let registeredClasses=0;
let totalAbsent=0;

/* ترتيب الفصول */
function classOrder(name){
  if(name.includes("أول")) return 1;
  if(name.includes("ثاني")) return 2;
  if(name.includes("ثالث")) return 3;
  return 99;
}

loadClasses();

async function loadClasses(){
  const res=await fetch("/api/getClasses");
  const data=await res.json();

  const classes=data.classes.sort((a,b)=>{
    const o1=classOrder(a), o2=classOrder(b);
    if(o1!==o2) return o1-o2;
    return a.localeCompare(b,"ar");
  });

  totalClasses=classes.length;
  registeredClasses=0;
  totalAbsent=0;

  const container=document.getElementById("classesView");
  container.innerHTML="";

  const reports=await Promise.all(
    classes.map(c=>fetch(`/api/getAttendanceReport?class=${encodeURIComponent(c)}&date=${today}`).then(r=>r.json()))
  );

  const counts=await Promise.all(
    classes.map(c=>fetch(`/api/getStudents?class=${encodeURIComponent(c)}`).then(r=>r.json()))
  );

  classes.forEach((cls,i)=>{
    const rep=reports[i];
    const studentCount=counts[i].students.length;
    const absentCount=rep.absent ?? null;

    const card=document.createElement("div");
    card.className="class-card";

    let statusText="لم يتم تسجيل الغياب";

    if(absentCount!==null){
      registeredClasses++;
      totalAbsent+=absentCount;
      if(absentCount===0){
        card.classList.add("ok");
        statusText="تم تسجيل الغياب – لا يوجد غياب";
      }else{
        card.classList.add("absent");
        statusText=`تم تسجيل الغياب – عدد الغائبين: ${absentCount}`;
      }
    }

    card.innerHTML=`
      <h3>${cls}</h3>
      <div class="count">عدد الطلاب: ${studentCount}</div>
      <div class="status">${statusText}</div>
      <button onclick="openClass('${cls}')">تسجيل الغياب</button>
    `;

    container.appendChild(card);
  });

  updateCounter();
}

function updateCounter(){
  document.getElementById("counterClasses").innerText=
    `الفصول المسجّلة: ${registeredClasses} من ${totalClasses}`;
  document.getElementById("counterAbsent").innerText=
    `إجمالي الغائبين: ${totalAbsent}`;
}

async function openClass(cls){
  selectedClass=cls;
  absentees=[];
  document.getElementById("classesView").classList.add("hidden");
  document.getElementById("attendanceView").classList.remove("hidden");
  document.getElementById("classTitle").innerText=cls;

  const res=await fetch(`/api/getStudents?class=${encodeURIComponent(cls)}`);
  const data=await res.json();
  const list=document.getElementById("studentsList");
  list.innerHTML="";

  data.students.forEach(s=>{
    const row=document.createElement("div");
    row.className="student";
    const name=document.createElement("span");
    name.innerText=s.Name;
    const btn=document.createElement("button");
    btn.className="status-btn present";
    btn.innerText="حاضر";

    btn.onclick=()=>{
      if(btn.classList.contains("present")){
        btn.classList.replace("present","absent");
        btn.innerText="غائب";
        absentees.push(s.Name);
      }else{
        btn.classList.replace("absent","present");
        btn.innerText="حاضر";
        absentees=absentees.filter(n=>n!==s.Name);
      }
    };

    row.appendChild(name);
    row.appendChild(btn);
    list.appendChild(row);
  });
}

async function saveAttendance(){
  await fetch("/api/saveAttendance",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      className:selectedClass,
      date:today,
      absentees
    })
  });

  document.getElementById("successAlert").style.display="block";
  setTimeout(()=>document.getElementById("successAlert").style.display="none",3000);

  loadClasses();
  backToClasses();
}

function backToClasses(){
  document.getElementById("attendanceView").classList.add("hidden");
  document.getElementById("classesView").classList.remove("hidden");
}
</script>

</body>
</html>
