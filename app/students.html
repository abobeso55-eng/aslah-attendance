<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الغياب</title>

<style>
:root{
  --green:#1f8f55;
  --red:#dc3545;
  --bg:#f4f6f5;
}

body{
  margin:0;
  font-family:'Cairo',Arial,sans-serif;
  background:var(--bg);
  color:#2c3e50;
}

/* ===== Header ===== */
header{
  background:var(--green);
  color:white;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
header h1{
  font-size:18px;
  margin:0;
}
header button{
  background:white;
  color:var(--green);
  border:none;
  padding:6px 12px;
  border-radius:8px;
  font-size:14px;
  cursor:pointer;
}

/* ===== Layout ===== */
.container{
  padding:16px;
}

/* ===== Classes ===== */
.classes{
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
}

.class-card{
  background:white;
  border-radius:14px;
  padding:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.class-card h3{
  margin:0 0 8px;
  font-size:18px;
}
.class-card .count{
  color:#777;
  margin-bottom:12px;
}
.class-card button{
  width:100%;
  background:var(--green);
  color:white;
  border:none;
  padding:10px;
  font-size:16px;
  border-radius:10px;
  cursor:pointer;
}

/* ===== Attendance ===== */
.hidden{display:none}

.toolbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}
.toolbar button{
  background:#6c757d;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  font-size:14px;
}

.student{
  background:white;
  border-radius:10px;
  padding:12px 14px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.student span{
  font-size:16px;
}

.status-btn{
  border:none;
  padding:6px 14px;
  border-radius:20px;
  font-size:14px;
  cursor:pointer;
}
.present{
  background:#d1e7dd;
  color:#0f5132;
}
.absent{
  background:#f8d7da;
  color:#842029;
}

/* ===== Save Button Bottom ===== */
.save-bottom{
  margin-top:20px;
}
.save-bottom button{
  width:100%;
  background:var(--green);
  color:white;
  border:none;
  padding:14px;
  font-size:18px;
  border-radius:14px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h1>تسجيل الغياب</h1>
  <button onclick="location.href='reportser>

<div class="container">

  <!-- ===== الفصول ===== -->
  <div id="classesView" class="classes"></div>

  <!-- ===== الغياب ===== -->
  <div id="attendanceView" class="hidden">
    <div class="toolbar">
      <button onclick="backToClasses()">⬅️ رجوع</button>
      <strong id="classTitle"></strong>
    </div>

    <div id="studentsList"></div>

    <!-- ✅ زر الحفظ أسفل الأسماء -->
    <div class="save-bottom">
      <button onclick="saveAttendance()">💾 حفظ الغياب</button>
    </div>
  </div>

</div>

<script>
const today = new Date().toISOString().split("T")[0];
let selectedClass = null;
let absentees = [];

// تحميل الفصول
loadClasses();

async function loadClasses(){
  const res = await fetch("/api/getClasses");
  const data = await res.json();
  const classes = data.classes;

  const container = document.getElementById("classesView");
  container.innerHTML = "";

  for(const cls of classes){
    const sres = await fetch(`/api/getStudents?class=${encodeURIComponent(cls)}`);
    const sdata = await sres.json();

    const card = document.createElement("div");
    card.className = "class-card";
    card.innerHTML = `
      <h3>${cls}</h3>
      <div class="count">عدد الطلاب: ${sdata.students.length}</div>
      <button onclick="openClass('${cls}')">تسجيل الغياب</button>
    `;
    container.appendChild(card);
  }
}

async function openClass(cls){
  selectedClass = cls;
  absentees = [];

  document.getElementById("classesView").classList.add("hidden");
  document.getElementById("attendanceView").classList.remove("hidden");
  document.getElementById("classTitle").innerText = cls;

  const res = await fetch(`/api/getStudents?class=${encodeURIComponent(cls)}`);
  const data = await res.json();

  const list = document.getElementById("studentsList");
  list.innerHTML = "";

  data.students.forEach(s=>{
    const row = document.createElement("div");
    row.className = "student";

    const name = document.createElement("span");
    name.innerText = s.Name;

    const btn = document.createElement("button");
    btn.className = "status-btn present";
    btn.innerText = "حاضر";

    btn.onclick = () => {
      if(btn.classList.contains("present")){
        btn.classList.replace("present","absent");
        btn.innerText="غائب";
        absentees.push(s.Name);
      }else{
        btn.classList.replace("absent","present");
        btn.innerText="حاضر";
        absentees = absentees.filter(n=>n!==s.Name);
      }
    };

    row.appendChild(name);
    row.appendChild(btn);
    list.appendChild(row);
  });
}

function backToClasses(){
  document.getElementById("attendanceView").classList.add("hidden");
  document.getElementById("classesView").classList.remove("hidden");
}

async function saveAttendance(){
  await fetch("/api/saveAttendance",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      className:selectedClass,
      date:today,
      absentees
    })
  });

  alert("✅ تم حفظ الغياب");
  backToClasses();
}
</script>

</body>
</html>
