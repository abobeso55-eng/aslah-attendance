<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الغياب</title>

  <style>
    :root {
      --green: #1f8f55;
      --red: #dc3545;
      --gray: #adb5bd;
      --bg: #f4f6f5;
      --card: #ffffff;
      --header-bg: #ffffff;
      --section-bg: #eaf4ef;
    }

    body {
      margin: 0;
      font-family: 'Cairo', Arial, sans-serif;
      background: var(--bg);
      color: #2c3e50;
    }

    /* ===== Header ===== */
    header {
      background: var(--header-bg);
      border-bottom: 3px solid var(--green);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-inner {
      max-width: 1100px;
      margin: auto;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .school {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .school img {
      height: 60px;
    }

    .school-text {
      font-size: 14px;
      line-height: 1.4;
    }

    .school-text strong {
      font-size: 17px;
    }

    .reports-btn {
      background: var(--green);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    /* ===== Section Title ===== */
    .grade-title {
      font-size: 20px;
      font-weight: bold;
      margin-top: 20px;
      margin-bottom: 10px;
      background: var(--section-bg);
      padding: 10px 14px;
      border-radius: 10px;
      border-right: 6px solid var(--green);
    }

    /* ===== Cards Grid ===== */
    .classes-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    }

    .class-card {
      background: var(--card);
      padding: 16px;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      border-top: 6px solid var(--gray);
      transition: transform .15s;
    }

    .class-card:hover {
      transform: translateY(-3px);
    }

    .class-card.ok {
      border-top-color: var(--green);
    }

    .class-card.absent {
      border-top-color: var(--red);
    }

    .class-card button {
      background: var(--green);
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
    }

    .counter {
      max-width: 1100px;
      margin: 15px auto 0;
      background: #eaf4ef;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      border-right: 6px solid var(--green);
    }

    #errorBox {
      display: none;
      background: #fff3cd;
      color: #7a5600;
      padding: 10px 16px;
      border-radius: 10px;
      margin: 15px auto;
      max-width: 1100px;
      border-right: 6px solid #e9c46a;
    }

    /* Attendance view */
    .hidden {
      display: none;
    }

    .attendance {
      max-width: 1100px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .student {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }

    .status-btn {
      border: none;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 20px;
      min-width: 70px;
      font-size: 14px;
    }

    .present {
      background: #d1e7dd;
      color: #0f5132;
    }

    .absent {
      background: #f8d7da;
      color: #842029;
    }

    .actions button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }

    .save-btn {
      background: var(--green);
      color: #fff;
    }

    .back-btn {
      background: #6c757d;
      color: #fff;
    }
  </style>
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="header-inner">
      <div class="school">
        <img src="assets/moe-logo.png">
        <div class="school-text">
          وزارة التعليم<br>
          إدارة التعليم بمنطقة الباحة<br>
          <strong>متوسطة العسلة</strong>
        </div>
      </div>

      <button class="reports-btn" onclick="location.href- COUNTER -->
  <div class="counter">
    <div id="counterClasses">الفصول المسجّلة: ...</div>
    <div id="counterAbsent">إجمالي الغياب: ...</div>
  </div>

  <!-- ERROR -->
  <div id="errorBox"></div>

  <div class="container">

    <!-- PLACE WHERE WE INSERT GRADE SECTIONS -->
    <div id="classesContainer"></div>

    <!-- ATTENDANCE -->
    <div id="attendanceView" class="attendance hidden">
      <h2 id="classTitle"></h2>
      <div id="studentsList"></div>

      <div class="actions">
        <button class="save-btn" onclick="saveAttendance()">💾 حفظ</button>
        <button class="back-btn" onclick="backToClasses()">⬅️ رجوع</button>
      </div>
    </div>

  </div>

  <script>
    async function fetchJson(url) {
      const res = await fetch(url, { cache: "no-store" });
      const txt = await res.text();
      try { return JSON.parse(txt); }
      catch { throw new Error("استجابة غير صالحة: " + url); }
    }

    function showError(msg) {
      let e = document.getElementById("errorBox");
      e.innerText = msg;
      e.style.display = "block";
    }

    /* ترتيب حسب الصف ثم الحرف */
    function classOrder(name) {
      let gradeOrder = 99;
      if (name.includes("أول")) gradeOrder = 1;
      else if (name.includes("ثاني")) gradeOrder = 2;
      else if (name.includes("ثالث")) gradeOrder = 3;

      const sec = name.match(/\((.*?)\)/);
      const letter = sec ? sec[1] : "";

      const alphabet = "أبجدهوزحطيكلمنسعفصقرشتثخذضظغ";
      const letterOrder = alphabet.indexOf(letter[0]) !== -1 ? alphabet.indexOf(letter[0]) : 999;

      return gradeOrder * 100 + letterOrder;
    }

    async function loadDashboard() {
      const container = document.getElementById("classesContainer");
      container.innerHTML = "جاري تحميل الفصول...";

      try {
        const data = await fetchJson("/api/getClasses");

        const classes = (data.classes || []).sort((a, b) => classOrder(a) - classOrder(b));

        container.innerHTML = "";

        const grades = {
          1: "أول متوسط",
          2: "ثاني متوسط",
          3: "ثالث متوسط"
        };

        Object.entries(grades).forEach(([k, title]) => {

          const gradeClasses = classes.filter(c => c.includes(title.split(" ")[0]));

          if (gradeClasses.length === 0) return;

          // title
          const t = document.createElement("div");
          t.className = "grade-title";
          t.innerText = title;
          container.appendChild(t);

          // grid
          const grid = document.createElement("div");
          grid.className = "classes-grid";

          gradeClasses.forEach(cls => {
            const card = document.createElement("div");
            card.className = "class-card";

            card.innerHTML = `
              <h3>${cls}</h3>
              <button onclick="openClass('${cls}')">تسجيل الغياب</button>
            `;

            grid.appendChild(card);
          });

          container.appendChild(grid);
        });

      } catch (e) {
        showError("تعذر تحميل الفصول: " + e.message);
      }
    }

    let selectedClass = null;
    let absentees = [];

    async function openClass(cls) {
      selectedClass = cls;
      absentees = [];

      document.getElementById("attendanceView").classList.remove("hidden");
      document.getElementById("classesContainer").style.display = "none";
      document.getElementById("classTitle").innerText = cls;

      const list = document.getElementById("studentsList");
      list.innerHTML = "جاري تحميل الطلاب...";

      try {
        const data = await fetchJson(`/api/getStudents?class=${encodeURIComponent(cls)}`);
        const students = data.students || [];

        list.innerHTML = "";

        students.forEach(s => {

          const row = document.createElement("div");
          row.className = "student";

          const name = document.createElement("span");
          name.innerText = s.Name;

          const btn = document.createElement("button");
          btn.className = "status-btn present";
          btn.innerText = "حاضر";

          btn.onclick = () => {
            if (btn.classList.contains("present")) {
              btn.classList.replace("present", "absent");
              btn.innerText = "غائب";
              absentees.push(s.Name);
            } else {
              btn.classList.replace("absent", "present");
              btn.innerText = "حاضر";
              absentees = absentees.filter(n => n !== s.Name);
            }
          };

          row.appendChild(name);
          row.appendChild(btn);
          list.appendChild(row);
        });

      } catch (e) {
        showError("خطأ في تحميل الطلاب: " + e.message);
      }
    }

    function backToClasses() {
      document.getElementById("attendanceView").classList.add("hidden");
      document.getElementById("classesContainer").style.display = "block";
    }

    async function saveAttendance() {
      try {
        await fetch("/api/saveAttendance", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            className: selectedClass,
            date: new Date().toISOString().split("T")[0],
            absentees
          })
        });

        alert("✅ تم حفظ الغياب");
        backToClasses();
        loadDashboard();

      } catch (e) {
        showError("فشل حفظ الغياب: " + e.message);
      }
    }

    document.addEventListener("DOMContentLoaded", loadDashboard);
  </script>

</body>
</html>
