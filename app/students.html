<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الغياب</title>

<style>
:root{
  --green:#1f8f55;
  --red:#dc3545;
  --gray:#adb5bd;
  --bg:#f4f6f5;
  --card:#ffffff;
}

/* GENERAL */
body{
  margin:0;
  font-family:'Cairo',Arial,sans-serif;
  background:var(--bg);
  color:#2c3e50;
}

/* HEADER */
header{
  background:#fff;
  border-bottom:3px solid var(--green);
}
.header-inner{
  max-width:1100px;
  margin:auto;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.school{
  display:flex;
  align-items:center;
  gap:10px;
}
.school img{
  height:60px;
}
.school-text strong{
  font-size:17px;
}

.reports-btn{
  background:var(--green);
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
}

/* COUNTER */
.counter{
  max-width:1100px;
  margin:12px auto;
  padding:12px;
  background:#e9f7ef;
  border-right:5px solid var(--green);
  border-radius:12px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
}

/* ERROR */
#errorBox{
  display:none;
  max-width:1100px;
  margin:12px auto;
  padding:12px;
  background:#fff3cd;
  border-right:5px solid #e0c063;
  color:#664d03;
  border-radius:10px;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:16px;
}

/* SECTION TITLE */
.grade-title{
  font-size:20px;
  font-weight:bold;
  background:#e6f5ec;
  padding:10px;
  margin:20px 0 10px;
  border-right:6px solid var(--green);
  border-radius:10px;
}

/* CLASS CARDS GRID */
.classes-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
}

/* CLASS CARD */
.class-card{
  background:white;
  padding:16px;
  border-radius:14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  border-top:6px solid var(--gray);
  transition:.2s;
}
.class-card:hover{
  transform:translateY(-4px);
}
.class-card.ok{ border-top-color:var(--green); }
.class-card.absent{ border-top-color:var(--red); }

.class-icon{
  font-size:40px;
  text-align:center;
  margin-bottom:6px;
}

.class-info{
  font-size:14px;
  margin:3px 0;
  color:#444;
}

.card-btn{
  width:100%;
  padding:10px;
  border:none;
  margin-top:8px;
  border-radius:10px;
  cursor:pointer;
  background:var(--green);
  color:white;
  font-size:15px;
}

/* ATTENDANCE PAGE */
.hidden{ display:none; }

.attendance{
  background:white;
  padding:16px;
  border-radius:14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.student{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #eee;
}
.status-btn{
  padding:6px 14px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}
.present{ background:#d1e7dd; color:#0f5132; }
.absent{ background:#f8d7da; color:#842029; }

.actions button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  margin-top:10px;
}
.save-btn{ background:var(--green); color:white; }
.back-btn{ background:#6c757d; color:white; }
</style>
</head>


<body>

<header>
  <div class="header-inner">
    <div class="school">
      <img src="assets/moe-logo.png">
      <div class="school-text">
        وزارة التعليم<br>
        إدارة التعليم بمنطقة الباحة<br>
        <strong>متوسطة العسلة</strong>
      </div>
    </div>

    <button class="reports-btn" onclick="location.href='reports.html <div id="counterClasses">الفصول: ...</div>
  <div id="counterAbsent">الغياب: ...</div>
</div>

<div id="errorBox"></div>

<div class="container">

  <div id="classesContainer"></div>

  <div id="attendanceView" class="attendance hidden">
    <h2 id="classTitle"></h2>
    <div id="studentsList"></div>

    <div class="actions">
      <button class="save-btn" onclick="saveAttendance()">💾 حفظ</button>
      <button class="back-btn" onclick="backToClasses()">⬅️ رجوع</button>
    </div>
  </div>

</div>


<script>

/* ترتيب الفصول */
function classOrder(name){
  let grade=99;
  if(name.includes("أول")) grade=1;
  else if(name.includes("ثاني")) grade=2;
  else if(name.includes("ثالث")) grade=3;

  const sec=name.match(/\((.*?)\)/);
  const letter=sec?sec[1]:"";
  const letters="أبجدهوزحطيكلمنسعفصقرشتثخذضظغ";
  const letterOrder=letters.indexOf(letter)>=0?letters.indexOf(letter):999;

  return grade*100+letterOrder;
}

async function fetchJson(url){
  const res=await fetch(url,{cache:"no-store"});
  const txt=await res.text();
  try{return JSON.parse(txt);}
  catch{ throw new Error("خطأ JSON من "+url); }
}

async function loadDashboard(){
  const container=document.getElementById("classesContainer");
  container.innerHTML="جاري تحميل الفصول...";

  try{
    const data=await fetchJson("/api/getClasses");
    let classes=(data.classes||[]).sort((a,b)=>classOrder(a)-classOrder(b));

    container.innerHTML="";

    const grades={
      1:"أول متوسط",
      2:"ثاني متوسط",
      3:"ثالث متوسط"
    };

    for(const [num,title] of Object.entries(grades)){

      const gradeClasses=classes.filter(c=>c.includes(title.split(" ")[0]));
      if(gradeClasses.length===0) continue;

      const t=document.createElement("div");
      t.className="grade-title";
      t.innerText=title;
      container.appendChild(t);

      const grid=document.createElement("div");
      grid.className="classes-grid";

      for(const cls of gradeClasses){

        const [studentsRes, repRes] = await Promise.all([
          fetchJson(`/api/getStudents?class=${encodeURIComponent(cls)}`),
          fetchJson(`/api/getAttendanceReport?class=${encodeURIComponent(cls)}&date=${new Date().toISOString().split("T")[0]}`)
        ]);

        const countStudents = studentsRes.students?.length || 0;
        const absentCount = repRes.absent ?? null;

        const card=document.createElement("div");
        card.className="class-card";

        if(absentCount===0) card.classList.add("ok");
        if(absentCount>0) card.classList.add("absent");

        card.innerHTML=`
          <div class="class-icon">🏫</div>
          <h3>${cls}</h3>
          <div class="class-info">👥 عدد الطلاب: <strong>${countStudents}</strong></div>
          <div class="class-info">❌ الغياب: <strong>${absentCount ?? "—"}</strong></div>

          <button class="card-btn" onclick="openClass('${cls}')">تسجيل الغياب</button>
          <button class="card-btn" onclick="location.href='reports.html?class=${encodeURIComponentrid.appendChild(card);
      }

      container.appendChild(grid);
    }

  }catch(e){
    showError("فشل تحميل الفصول: "+e.message);
  }
}

let selectedClass=null;
let absentees=[];

async function openClass(cls){
  selectedClass=cls;
  absentees=[];

  document.getElementById("attendanceView").classList.remove("hidden");
  document.getElementById("classesContainer").style.display="none";
  document.getElementById("classTitle").innerText=cls;

  const list=document.getElementById("studentsList");
  list.innerHTML="جاري تحميل...";

  const data=await fetchJson(`/api/getStudents?class=${encodeURIComponent(cls)}`);

  list.innerHTML="";

  data.students.forEach(s=>{
    const row=document.createElement("div");
    row.className="student";

    const name=document.createElement("span");
    name.innerText=s.Name;

    const btn=document.createElement("button");
    btn.className="status-btn present";
    btn.innerText="حاضر";

    btn.onclick=()=>{
      if(btn.classList.contains("present")){
        btn.classList.replace("present","absent");
        btn.innerText="غائب";
        absentees.push(s.Name);
      }else{
        btn.classList.replace("absent","present");
        btn.innerText="حاضر";
        absentees=absentees.filter(n=>n!==s.Name);
      }
    };

    row.appendChild(name);
    row.appendChild(btn);
    list.appendChild(row);
  });
}

function backToClasses(){
  document.getElementById("attendanceView").classList.add("hidden");
  document.getElementById("classesContainer").style.display="block";
}

async function saveAttendance(){
  await fetch("/api/saveAttendance",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      className:selectedClass,
      date:new Date().toISOString().split("T")[0],
      absentees
    })
  });

  alert("✅ تم حفظ الغياب");
  backToClasses();
  loadDashboard();
}

document.addEventListener("DOMContentLoaded",loadDashboard);

</script>

</body>
</html>
``
