<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الغياب</title>

<style>
:root{
  --green:#1f8f55;
  --red:#dc3545;
  --bg:#f4f6f5;
  --card:#ffffff;
}

body{
  margin:0;
  font-family:'Cairo',Arial,sans-serif;
  background:var(--bg);
  color:#2c3e50;
}

/* ===== Header ===== */
header{
  background:#ffffff;
  border-bottom:3px solid var(--green);
}
.header-inner{
  max-width:900px;
  margin:auto;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.school{
  display:flex;
  align-items:center;
  gap:12px;
}
.school img{
  height:48px;
}
.school-text{
  line-height:1.4;
  font-size:14px;
}
.school-text strong{
  font-size:16px;
}
header button{
  background:var(--green);
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}

/* ===== Container ===== */
.container{
  max-width:900px;
  margin:auto;
  padding:16px;
}

/* ===== Classes ===== */
.classes{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:16px;
}

.class-card{
  background:var(--card);
  border-radius:14px;
  padding:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  border-top:6px solid #ccc;
}
.class-card.ok{
  border-top-color:var(--green);
}
.class-card.absent{
  border-top-color:var(--red);
}
.class-card h3{
  margin:0 0 6px;
}
.class-card .count{
  color:#777;
  margin-bottom:6px;
}
.class-card .status{
  font-size:14px;
  margin-bottom:10px;
}
.class-card button{
  width:100%;
  background:var(--green);
  color:white;
  border:none;
  padding:10px;
  font-size:15px;
  border-radius:10px;
  cursor:pointer;
}

/* ===== Attendance ===== */
.hidden{display:none}

.attendance{
  background:var(--card);
  border-radius:14px;
  padding:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.student{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid #eee;
}
.student:last-child{border:none}

.status-btn{
  border:none;
  padding:6px 14px;
  border-radius:20px;
  cursor:pointer;
}
.present{
  background:#d1e7dd;
  color:#0f5132;
}
.absent{
  background:#f8d7da;
  color:#842029;
}

/* ===== Actions ===== */
.actions{
  margin-top:20px;
}
.actions button{
  width:100%;
  padding:14px;
  font-size:16px;
  border-radius:14px;
  border:none;
  cursor:pointer;
}
.save-btn{
  background:var(--green);
  color:white;
  margin-bottom:10px;
}
.back-btn{
  background:#6c757d;
  color:white;
}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="school">
      <img src="assets/moe-logo.png">
      <div class="school-text">
        وزارة التعليم<br>
        إدارة التعليم بمنطقة الباحة<br>
        <strong>متوسطة العسلة</strong>
      </div>
    </div>
    <button onclick="location.href='header>

<div class="container">

  <!-- الصفحة الرئيسية -->
  <div id="classesView" class="classes"></div>

  <!-- داخل الفصل -->
  <div id="attendanceView" class="attendance hidden">
    <h2 id="classTitle"></h2>
    <div id="studentsList"></div>

    <div class="actions">
      <button class="save-btn" onclick="saveAttendance()">💾 حفظ الغياب</button>
      <button class="back-btn" onclick="backToClasses()">⬅️ الرجوع للفصول</button>
    </div>
  </div>

</div>

<script>
const today = new Date().toISOString().split("T")[0];
let selectedClass=null;
let absentees=[];
const classCards={};

loadClasses();

async function loadClasses(){
  const res=await fetch("/api/getClasses");
  const data=await res.json();
  const classes=data.classes;

  const container=document.getElementById("classesView");
  container.innerHTML="";

  for(const cls of classes){
    const sres=await fetch(`/api/getStudents?class=${encodeURIComponent(cls)}`);
    const sdata=await sres.json();

    const card=document.createElement("div");
    card.className="class-card";
    card.innerHTML=`
      <h3>${cls}</h3>
      <div class="count">عدد الطلاب: ${sdata.students.length}</div>
      <div class="status">لم يتم تسجيل الغياب</div>
      <button onclick="openClass('${cls}')">تسجيل الغياب</button>
    `;
    container.appendChild(card);
    classCards[cls]=card;
  }
}

async function openClass(cls){
  selectedClass=cls;
  absentees=[];
  document.getElementById("classesView").classList.add("hidden");
  document.getElementById("attendanceView").classList.remove("hidden");
  document.getElementById("classTitle").innerText=cls;

  const res=await fetch(`/api/getStudents?class=${encodeURIComponent(cls)}`);
  const data=await res.json();
  const list=document.getElementById("studentsList");
  list.innerHTML="";

  data.students.forEach(s=>{
    const row=document.createElement("div");
    row.className="student";
    const name=document.createElement("span");
    name.innerText=s.Name;
    const btn=document.createElement("button");
    btn.className="status-btn present";
    btn.innerText="حاضر";

    btn.onclick=()=>{
      if(btn.classList.contains("present")){
        btn.classList.replace("present","absent");
        btn.innerText="غائب";
        absentees.push(s.Name);
      }else{
        btn.classList.replace("absent","present");
        btn.innerText="حاضر";
        absentees=absentees.filter(n=>n!==s.Name);
      }
    };

    row.appendChild(name);
    row.appendChild(btn);
    list.appendChild(row);
  });
}

async function saveAttendance(){
  await fetch("/api/saveAttendance",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      className:selectedClass,
      date:today,
      absentees
    })
  });

  const card=classCards[selectedClass];
  const status=card.querySelector(".status");

  if(absentees.length>0){
    card.classList.add("absent");
    card.classList.remove("ok");
    status.innerText=`تم تسجيل الغياب – عدد الغائبين: ${absentees.length}`;
  }else{
    card.classList.add("ok");
    card.classList.remove("absent");
    status.innerText="تم تسجيل الغياب – لا يوجد غياب";
  }

  backToClasses();
}

function backToClasses(){
  document.getElementById("attendanceView").classList.add("hidden");
  document.getElementById("classesView").classList.remove("hidden");
}
</script>

</body>
</html>
