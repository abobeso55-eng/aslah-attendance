<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>إدارة الطلاب</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #f2f5f4;
      font-family: 'Cairo', Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      color: #2c3e50;
    }

    .sidebar {
      width: 260px;
      background: #27ae60;
      color: white;
      padding: 20px;
      height: 100vh;
      box-sizing: border-box;
    }

    .sidebar h2 {
      text-align: center;
      margin-top: 0;
    }

    .class-item {
      padding: 12px;
      background: rgba(255,255,255,0.15);
      margin-bottom: 10px;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
    }

    .class-item:hover {
      background: rgba(255,255,255,0.3);
    }

    .class-item.active {
      background: #ffffff;
      color: #27ae60;
      font-weight: bold;
    }

    .content {
      flex-grow: 1;
      padding: 30px;
      box-sizing: border-box;
    }

    .upload-box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .upload-box button {
      padding: 10px 20px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .students-list {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .student-row {
      padding: 8px;
      border-bottom: 1px solid #eee;
    }

    .empty {
      text-align: center;
      color: #888;
      padding: 15px;
    }
  </style>
</head>

<body>

  <!-- الشريط الجانبي -->
  <div class="sidebar">
    <h2>الفصول</h2>
    <div class="class-item">أول متوسط (أ)</div>
    <div class="class-item">أول متوسط (ب)</div>
    <div class="class-item">أول متوسط (ج)</div>
    <div class="class-item">ثاني متوسط (أ)</div>
    <div class="class-item">ثاني متوسط (ب)</div>
    <div class="class-item">ثالث متوسط (أ)</div>
    <div class="class-item">ثالث متوسط (ب)</div>
  </div>

  <!-- المحتوى -->
  <div class="content">

    <!-- ✅ زر الرفع -->
    <div class="upload-box">
      <h3>📤 رفع أسماء الطلاب (سيتم حذف القديم)</h3>
      <input type="file" id="excelFile" accept=".xlsx">
      <br><br>
      <button onclick="uploadExcel()">رفع الملف</button>
    </div>

    <h2 id="title">اختر فصلًا لعرض الطلاب</h2>

    <div class="students-list" id="studentsList">
      <div class="empty">لم يتم اختيار فصل بعد</div>
    </div>

  </div>

<script>
  const classItems = document.querySelectorAll(".class-item");
  const studentsList = document.getElementById("studentsList");
  const title = document.getElementById("title");

  classItems.forEach(item => {
    item.addEventListener("click", () => {
      classItems.forEach(x => x.classList.remove("active"));
      item.classList.add("active");

      const className = item.innerText;
      title.innerText = "طلاب " + className;

      loadStudents(className);
    });
  });

  // ✅ رفع ملف Excel (حذف ثم رفع)
  async function uploadExcel() {
    const fileInput = document.getElementById("excelFile");

    if (!fileInput.files.length) {
      alert("اختر ملف Excel أولاً");
      return;
    }

    if (!confirm("سيتم حذف جميع الطلاب الحاليين ثم رفع الملف الجديد، هل أنت متأكد؟")) {
      return;
    }

    try {
      const buffer = await fileInput.files[0].arrayBuffer();

      const res = await fetch("/api/uploadStudentsExcel", {
        method: "POST",
        headers: { "Content-Type": "application/octet-stream" },
        body: buffer
      });

      const text = await res.text();
      const result = JSON.parse(text);

      if (!result.success) {
        alert(result.error || "فشل الرفع");
        return;
      }

      alert(
        "✅ تم رفع الطلاب بنجاح\n" +
        "عدد الطلاب: " + result.inserted
      );

      studentsList.innerHTML = "<div class='empty'>اختر فصلًا لعرض الطلاب</div>";
      title.innerText = "اختر فصلًا لعرض الطلاب";

    } catch (e) {
      alert("حدث خطأ أثناء الرفع");
      console.error(e);
    }
  }

  // ✅ عرض الطلاب
  async function loadStudents(className) {
    studentsList.innerHTML = "<div class='empty'>جاري التحميل...</div>";

    try {
      const res = await fetch(`/api/getStudents?class=${encodeURIComponent(className)}`);
      const data = await res.json();

      if (!data.success || data.students.length === 0) {
        studentsList.innerHTML = "<div class='empty'>لا يوجد طلاب</div>";
        return;
      }

      studentsList.innerHTML = "";
      data.students.forEach(s => {
        const div = document.createElement("div");
        div.className = "student-row";
        div.innerText = s.Name;
        studentsList.appendChild(div);
      });

    } catch {
      studentsList.innerHTML = "<div class='empty'>تعذر تحميل الطلاب</div>";
    }
  }
</script>

</body>
</html>
