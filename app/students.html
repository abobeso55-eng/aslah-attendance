<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>إدارة الطلاب</title>

  <style>
    body {
      background: #f2f5f4;
      font-family: Arial;
      margin: 0;
      padding: 0;
      display: flex;
    }

    .sidebar {
      width: 260px;
      background: #27ae60;
      color: white;
      padding: 20px;
      height: 100vh;
    }

    .content {
      flex-grow: 1;
      padding: 30px;
    }

    .upload-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h3>الفصول</h3>
  <div>أول متوسط</div>
  <div>ثاني متوسط</div>
  <div>ثالث متوسط</div>
</div>

<div class="content">
  <h2>رفع أسماء الطلاب</h2>

  <div class="upload-box">
    <input type="file" id="excelFile" accept=".xlsx">
    <br><br>
    <button onclick="uploadExcel()">رفع الملف</button>
  </div>
</div>

<script>
async function uploadExcel() {
  const fileInput = document.getElementById("excelFile");

  if (!fileInput.files.length) {
    alert("اختر ملف Excel أولاً");
    return;
  }

  try {
    const buffer = await fileInput.files[0].arrayBuffer();

    const res = await fetch("/api/uploadStudentsExcel", {
      method: "POST",
      headers: {
        "Content-Type": "application/octet-stream"
      },
      body: buffer
    });

    const text = await res.text();
    let result;

    try {
      result = JSON.parse(text);
    } catch {
      alert("خطأ غير متوقع من الخادم");
      console.error(text);
      return;
    }

    if (!result.success) {
      alert(result.error || "فشل رفع الملف");
      return;
    }

    alert(
      "✅ تم رفع الطلاب بنجاح\n" +
      "المدخلين: " + result.inserted + "\n" +
      "المتجاهلين: " + result.skipped
    );

  } catch (err) {
    alert("حدث خطأ أثناء الرفع");
    console.error(err);
  }
}
</script>

</body>
</html>
