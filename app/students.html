<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة الطلاب</title>

<style>
:root{
  --green:#1f8f55;
  --red:#dc3545;
  --gray:#adb5bd;
  --bg:#f4f6f5;
}

body{
  margin:0;
  font-family:'Cairo',Arial,sans-serif;
  background:var(--bg);
  color:#2c3e50;
}

.container{
  max-width:900px;
  margin:auto;
  padding:16px;
}

header{
  background:#fff;
  border-bottom:3px solid var(--green);
  padding:14px;
  text-align:center;
  font-weight:bold;
  font-size:20px;
}

.card{
  background:#fff;
  padding:16px;
  border-radius:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  margin-top:20px;
}

input, select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:15px;
}

button{
  background:var(--green);
  color:white;
  border:none;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
  width:100%;
}

table{
  width:100%;
  margin-top:15px;
  border-collapse:collapse;
}

th, td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:right;
}

th{
  background:#e1f3ea;
}
</style>
</head>

<body>

<header>إدارة الطلاب</header>

<div class="container">

  <div class="card">
    <label>اسم الطالب</label>
    <input id="studentName" placeholder="اسم الطالب">

    <label>الفصل</label>
    <select id="className"></select>

    <button onclick="addStudent()">➕ إضافة طالب</button>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>اسم الطالب</th>
          <th>الفصل</th>
        </tr>
      </thead>
      <tbody id="studentsTable"></tbody>
    </table>
  </div>

</div>

<script>
async function fetchJson(url){
  const r = await fetch(url);
  return await r.json();
}

async function loadClasses(){
  const sel = document.getElementById("className");
  const data = await fetchJson("/api/getClasses");
  sel.innerHTML="";
  data.classes.forEach(c=>{
    const o=document.createElement("option");
    o.value=c;
    o.textContent=c;
    sel.appendChild(o);
  });
}

async function loadStudents(){
  const t = document.getElementById("studentsTable");
  t.innerHTML="";
  const data = await fetchJson("/api/getAllStudents");
  data.students.forEach(s=>{
    const r=document.createElement("tr");
    r.innerHTML=`<td>${s.Name}</td><td>${s.Class}</td>`;
    t.appendChild(r);
  });
}

async function addStudent(){
  const name=document.getElementById("studentName").value.trim();
  const cls=document.getElementById("className").value;
  if(!name) return alert("أدخل اسم الطالب");

  await fetch("/api/addStudent",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ name, className:cls })
  });

  document.getElementById("studentName").value="";
  loadStudents();
}

document.addEventListener("DOMContentLoaded",()=>{
  loadClasses();
  loadStudents();
});
</script>

</body>
</html>
