<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الغياب</title>

<style>
body{
  font-family:'Cairo',Arial,sans-serif;
  margin:0;
  background:#f4f6f5;
  color:#2c3e50;
}

/* ===== Header ===== */
header{
  background:#ffffff;
  padding:15px 25px;
  border-bottom:4px solid #1f8f55;
}
.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}
.school{
  display:flex;
  align-items:center;
  gap:15px;
}
.school img{height:60px}
.school-text{
  line-height:1.4;
}
.school-text .ministry,
.school-text .admin{
  color:#1f8f55;
  font-size:14px;
}
.school-text .name{
  color:#1f8f55;
  font-size:18px;
  font-weight:bold;
}
.title{
  color:#1f8f55;
  font-weight:bold;
  font-size:18px;
}

/* زر التقارير */
.report-btn{
  background:#0d6efd;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

/* ===== Layout ===== */
.container{padding:25px}

/* ===== Controls ===== */
.toolbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}
.toolbar input{
  padding:6px 10px;
  font-size:14px;
}
.save-btn{
  background:#198754;
  color:white;
  border:none;
  padding:8px 18px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

/* ===== Classes ===== */
.classes{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
}
.class-card{
  background:white;
  border-radius:10px;
  padding:12px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}
.class-card h4{
  margin:0 0 10px;
  color:#1f8f55;
  font-size:16px;
}

/* ===== Students ===== */
.student{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 0;
  border-bottom:1px solid #eee;
}
.student:last-child{border:none}

.status-btn{
  border:none;
  padding:4px 12px;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
}
.present{background:#d1e7dd;color:#0f5132}
.absent{background:#f8d7da;color:#842029}

/* ===== Print ===== */
@media print{
  .report-btn,.save-btn{display:none}
}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="school">
      assets/moe-logo.png
      <div class="school-text">
        <div class="ministry">وزارة التعليم</div>
        <div class="admin">إدارة التعليم بمنطقة الباحة</div>
        <div class="name">متوسطة العسلة</div>
      </div>
    </div>

    <div class="title">تسجيل الغياب</div>

    <!-- ✅ زر الانتقال إلى التقارير -->
    <button class="report-btn" onclick="location.href='reports.htmliv>
</header>

<div class="container">

  <!-- التاريخ -->
  <div class="toolbar">
    <div>
      📅 التاريخ:
      <input type="date" id="attendanceDate">
    </div>
    <button class="save-btn" onclick="saveAttendance()">💾 حفظ الغياب</button>
  </div>

  <!-- الفصول والطلاب -->
  <div class="classes" id="classesContainer"></div>

</div>

<script>
const dateInput = document.getElementById("attendanceDate");
const today = new Date().toISOString().split("T")[0];
dateInput.value = today;

const absentees = {};
const classesContainer = document.getElementById("classesContainer");

// تحميل الفصول
loadClasses();

async function loadClasses(){
  const res = await fetch("/api/getClasses");
  const data = await res.json();
  const classes = data.classes;

  classesContainer.innerHTML = "";

  for(const cls of classes){
    absentees[cls] = [];

    const card = document.createElement("div");
    card.className = "class-card";
    card.innerHTML = `<h4>${cls}</h4><div>جاري التحميل...</div>`;
    classesContainer.appendChild(card);

    const sres = await fetch(`/api/getStudents?class=${encodeURIComponent(cls)}`);
    const sdata = await sres.json();

    const list = document.createElement("div");
    list.innerHTML = "";

    sdata.students.forEach(name=>{
      const row = document.createElement("div");
      row.className = "student";

      const btn = document.createElement("button");
      btn.className = "status-btn present";
      btn.innerText = "حاضر";

      btn.onclick = () => {
        if(btn.classList.contains("present")){
          btn.classList.remove("present");
          btn.classList.add("absent");
          btn.innerText = "غائب";
          absentees[cls].push(name);
        }else{
          btn.classList.remove("absent");
          btn.classList.add("present");
          btn.innerText = "حاضر";
          absentees[cls] = absentees[cls].filter(n=>n!==name);
        }
      };

      row.innerHTML = `<span>${name}</span>`;
      row.appendChild(btn);
      list.appendChild(row);
    });

    card.innerHTML = `<h4>${cls}</h4>`;
    card.appendChild(list);
  }
}

async function saveAttendance(){
  const date = dateInput.value;

  for(const cls in absentees){
    await fetch("/api/saveAttendance",{
      method:"POST",
      headers:{ "Content-Type":"application/json"},
      body:JSON.stringify({
        className:cls,
        date,
        absentees:absentees[cls]
      })
    });
  }

  alert("✅ تم حفظ الغياب بنجاح");
}
</script>

</body>
</html>
``
