<html lang="ar" dir="rtl">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقارير الغياب</title>

    <style>
        body {
            background: #f2f5f4;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            color: #2c3e50;

        header {
            background: #27ae60;
            padding: 20px;
            color: white;
            text-align: center;
            font-weight: 700;

        }

        .container {
            width: 95%;
            max-width: 1100px;
            margin: auto;
            margin-top: 25px;
        }

            background: #2c3e50;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;

            display: inline-block;
            margin-bottom: 20px;
        }

        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;

        }

        .btn {

            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }

        .btn:hover {
            background: #1d8a4d;
        }

        .excel-btn {
            background: #2c3e50;
        }

        .excel-btn:hover {
            background: #000;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
