<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>سجل الغياب</title>

<style>
body{
  font-family:'Cairo',Arial,sans-serif;
  background:#f4f6f5;
  margin:0;
  color:#2c3e50;
}
header{
  background:#ffffff;
  padding:15px 25px;
  border-bottom:4px solid #1f8f55;
}
.container{padding:25px}

.card{
  background:white;
  border-radius:14px;
  padding:20px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  margin-bottom:20px;
}

.stats{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  font-weight:bold;
}
.good{color:#198754}
.bad{color:#dc3545}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:12px;
  overflow:hidden;
}
th,td{
  padding:10px;
  border-bottom:1px solid #eee;
}
th{background:#f9f9f9}

.print-btn{
  background:#0d6efd;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:15px;
}
</style>
</head>

<body>

<header>
  <h2>📋 سجل الغياب (جميع الفصول)</h2>
</header>

<div class="container">

  <button class="print-btn" onclick="window.print()">🖨️ طباعة</button>

  <div class="card">
    📅 التاريخ:
    <input type="date" id="logDate">
    <button onclick="loadLog()">عرض السجل</button>
  </div>

  <div class="card stats">
    <div>👥 إجمالي الطلاب: <span id="totalStudents">0</span></div>
    <div class="good">✅ الحاضر: <span id="presentCount">0</span></div>
    <div class="bad">❌ الغائب: <span id="absentCount">0</span></div>
    <div class="bad">📊 نسبة الغياب: <span id="absentPercent">0%</span></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>الفصل</th>
        <th>اسم الطالب الغائب</th>
      </tr>
    </thead>
    <tbody id="logTable">
      <tr><td colspan="3" style="text-align:center">اختر تاريخًا</td></tr>
    </tbody>
  </table>

</div>

<script>
window.onload = () => {
  document.getElementById("logDate").value =
    new Date().toISOString().split("T")[0];
};

async function loadLog(){
  const date = document.getElementById("logDate").value;
  const res = await fetch(`/api/getAttendanceAllByDate?date=${date}`);
  const data = await res.json();

  document.getElementById("totalStudents").innerText = data.totalStudents;
  document.getElementById("presentCount").innerText = data.presentCount;
  document.getElementById("absentCount").innerText = data.absentCount;
  document.getElementById("absentPercent").innerText = data.absentPercent + "%";

  const table = document.getElementById("logTable");
  table.innerHTML = "";

  if (data.absentees.length === 0) {
    table.innerHTML =
      `<tr><td colspan="3" style="text-align:center">لا يوجد غياب</td></tr>`;
    return;
  }

  data.absentees.forEach((x,i)=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${i+1}</td>
      <td>${x.Class}</td>
      <td>${x.StudentName}</td>
    `;
    table.appendChild(tr);
  });
}
</script>

</body>
</html>
